<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portal VIP — CODE CELLS®</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0A0A0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CODE CELLS VIP">
<link rel="manifest" href="/manifest-vip.json">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="icon" href="/assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0A0A;
    --bg-panel: #141310;
    --surface: #1B1914;
    --surface-2: #221F18;
    --ink: #F5F1E4;
    --ink-muted: #A79E88;
    --ink-dim: #6E6656;
    --line: rgba(245,241,228,0.10);
    --line-strong: rgba(245,241,228,0.22);
    --gold: #C9A24B;
    --gold-soft: rgba(201,162,75,0.14);
    --gold-line: rgba(201,162,75,0.35);
    --c-energy: #E8A33D; --c-repair: #D4654A; --c-balance: #4FA8A0; --c-neuro: #8B7FD4; --c-regen: #5FAE6E;
    --health-optimo: #7ED957;
    --health-bueno: #C9A24B;
    --health-atencion: #D4654A;
    --font-display: "Fraunces", serif;
    --font-body: "IBM Plex Sans", sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
    --ease: cubic-bezier(.16,.84,.44,1);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; } }
  body{
    background: var(--bg); color: var(--ink); font-family: var(--font-body);
    min-height:100vh; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
    -webkit-tap-highlight-color: transparent;
  }
  a{ color:inherit; } button{ font-family:inherit; cursor:pointer; border:none; } input{ font-family:inherit; }

  #bg-video-layer{ position:fixed; inset:0; z-index:-2; overflow:hidden; background:var(--bg); }
  #bg-video-layer video{ width:100%; height:100%; object-fit:cover; opacity:0.4; }
  #bg-video-layer::after{ content:''; position:absolute; inset:0;
    background: radial-gradient(circle at 50% 15%, rgba(10,10,10,0.35), rgba(10,10,10,0.88) 65%, var(--bg) 100%); }

  #app{ max-width:560px; margin:0 auto; padding: 20px 20px calc(20px + var(--safe-bottom)); min-height:100vh; display:flex; flex-direction:column; }
  .center-screen{ flex:1; display:flex; flex-direction:column; justify-content:center; }

  .eyebrow{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); display:flex; align-items:center; gap:8px; margin-bottom:1.1rem; }
  .eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px var(--gold); }

  .card{ background:var(--bg-panel); border:1px solid var(--line); border-radius:18px; padding:2.2rem 1.8rem; animation: fadeUp 0.5s var(--ease); }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  h1,h2,h3{ font-family:var(--font-display); font-weight:500; line-height:1.15; }
  h1{ font-size:1.7rem; margin-bottom:0.7rem; }
  h2{ font-size:1.3rem; margin-bottom:0.6rem; }
  p.lede{ color:var(--ink-muted); font-size:0.95rem; line-height:1.6; margin-bottom:1.4rem; }

  .field{ margin-bottom:1rem; }
  .field label{ display:block; font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:0.4rem; }
  .field input{ width:100%; background:var(--surface); border:1px solid var(--line-strong); color:var(--ink); border-radius:10px; padding:0.85rem 1rem; font-size:1rem; outline:none; }
  .field input:focus{ border-color:var(--gold); }

  .btn-gold{ width:100%; background:var(--gold); color:#151208; font-weight:600; font-size:0.98rem; border-radius:10px; padding:1rem 1.2rem; transition:transform .15s var(--ease), box-shadow .15s var(--ease); }
  .btn-gold:hover{ box-shadow:0 6px 22px rgba(201,162,75,.25); transform:translateY(-1px); }
  .btn-gold:disabled{ opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-ghost{ width:100%; background:transparent; color:var(--ink-muted); border:1px solid var(--line-strong); border-radius:10px; padding:0.9rem 1.2rem; margin-top:0.7rem; font-size:0.9rem; }
  .btn-ghost:hover{ color:var(--ink); border-color:var(--ink-muted); }
  .error-msg{ color:#D4654A; font-size:0.85rem; margin-top:0.6rem; min-height:1.2em; }

  /* PIN pad */
  .pin-dots{ display:flex; gap:14px; justify-content:center; margin: 1.6rem 0; }
  .pin-dots span{ width:14px; height:14px; border-radius:50%; border:1.5px solid var(--line-strong); transition: background .15s var(--ease), border-color .15s var(--ease); }
  .pin-dots span.filled{ background:var(--gold); border-color:var(--gold); }
  .pin-keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto; }
  .pin-key{ background:var(--surface); border:1px solid var(--line-strong); color:var(--ink); border-radius:14px; padding:1.1rem 0; font-size:1.3rem; font-family:var(--font-display); }
  .pin-key:active{ background:var(--gold-soft); border-color:var(--gold-line); }
  .pin-key.empty{ background:transparent; border:none; pointer-events:none; }

  /* Dashboard */
  body{ padding-bottom: calc(84px + var(--safe-bottom)); }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:1.4rem; }
  .topbar-brand{ display:flex; align-items:center; gap:10px; }
  .topbar-brand img{ width:34px; height:34px; object-fit:contain; }
  .topbar-brand-text{ display:flex; flex-direction:column; line-height:1.1; }
  .topbar-brand-text b{ font-family:var(--font-display); font-size:1.05rem; letter-spacing:0.02em; font-weight:600; }
  .topbar-brand-text span{ font-family:var(--font-mono); font-size:0.58rem; letter-spacing:0.14em; color:var(--gold); }
  .btn-icon{ background:var(--surface); border:1px solid var(--line-strong); color:var(--ink-muted); border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }

  .program-header{ margin-bottom:1.2rem; display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .program-header .eyebrow{ margin-bottom:0.3rem; }
  .program-header h1{ font-size:1.6rem; color:var(--gold); margin-bottom:0.2rem; letter-spacing:0.01em; }
  .program-header .tagline{ font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.08em; color:var(--ink-dim); text-transform:uppercase; }
  .vip-badge{ flex-shrink:0; border:1px solid var(--gold-line); border-radius:10px; padding:0.4rem 0.7rem; text-align:center; }
  .vip-badge b{ display:block; font-family:var(--font-display); font-size:0.8rem; color:var(--gold); }
  .vip-badge span{ font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.08em; color:var(--ink-dim); }

  .stat-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .ring-card, .nova-mini-card{ background:var(--bg-panel); border:1px solid var(--line); border-radius:16px; padding:1.2rem 1rem; display:flex; flex-direction:column; align-items:center; text-align:center; }
  .ring-card .vip-card-title, .nova-mini-card .vip-card-title{ align-self:flex-start; }
  .score-ring-svg{ margin:0.4rem 0 0.2rem; }
  .ring-number{ font-family:var(--font-display); font-size:1.9rem; font-weight:500; }
  .ring-outof{ font-family:var(--font-mono); font-size:0.65rem; color:var(--ink-dim); margin-top:-4px; }
  .ring-status{ font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; margin-top:0.3rem; font-weight:600; }

  .nova-mini-card{ justify-content:center; cursor:pointer; transition:border-color .15s var(--ease); }
  .nova-mini-card:hover{ border-color:var(--gold-line); }
  .nova-mini-card p{ font-size:0.78rem; color:var(--ink-muted); margin:0.3rem 0 0.9rem; line-height:1.4; }
  .nova-orb{ width:64px; height:64px; border-radius:50%; position:relative; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 35% 30%, #F3DFA3, var(--gold) 55%, #8a6c26 100%); box-shadow:0 0 24px rgba(201,162,75,0.45); }
  .nova-orb::after{ content:''; position:absolute; inset:-6px; border-radius:50%; border:1px solid var(--gold-line); animation:orbPulse 2.4s infinite; }
  @keyframes orbPulse{ 0%{ transform:scale(0.9); opacity:0.7; } 70%{ transform:scale(1.25); opacity:0; } 100%{ opacity:0; } }
  .nova-orb-label{ font-family:var(--font-display); font-weight:600; font-size:0.68rem; color:#151208; letter-spacing:0.02em; }

  .vip-card{ background:var(--bg-panel); border:1px solid var(--line); border-radius:16px; padding:1.4rem 1.3rem; margin-bottom:12px; }
  .vip-card-title{ font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:0.2rem; }
  .vip-card-sub{ font-size:0.78rem; color:var(--ink-muted); margin-bottom:0.9rem; }

  .sys-row{ display:flex; align-items:center; gap:12px; padding:0.7rem 0; border-top:1px solid var(--line); }
  .sys-row:first-of-type{ border-top:none; }
  .sys-ic{ width:38px; height:38px; border-radius:10px; background:var(--surface); border:1px solid var(--line-strong); display:flex; align-items:center; justify-content:center; font-size:1.05rem; flex-shrink:0; }
  .sys-mid{ flex:1; min-width:0; }
  .sys-name{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.04em; color:var(--ink); margin-bottom:0.4rem; }
  .sys-track{ height:5px; background:var(--surface); border-radius:4px; overflow:hidden; }
  .sys-fill{ height:100%; border-radius:4px; }
  .sys-right{ text-align:right; flex-shrink:0; }
  .sys-score{ font-family:var(--font-display); font-size:1.15rem; line-height:1; }
  .sys-status{ font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.06em; text-transform:uppercase; margin-top:2px; }

  .protocol-name{ font-family:var(--font-display); font-size:1.15rem; color:var(--gold); margin-bottom:0.3rem; }
  .protocol-days{ font-size:0.85rem; color:var(--ink-muted); }

  .team-row-wrap{ display:flex; gap:16px; overflow-x:auto; padding-bottom:2px; }
  .team-member{ display:flex; flex-direction:column; align-items:center; text-align:center; width:74px; flex-shrink:0; }
  .avatar-circle{ width:56px; height:56px; border-radius:50%; border:1.5px solid var(--gold-line); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:1.1rem; color:var(--gold); background:var(--surface); margin-bottom:0.5rem; }
  .avatar-add{ border-style:dashed; color:var(--ink-dim); font-size:1.3rem; }
  .team-member-name{ font-size:0.72rem; line-height:1.2; }
  .team-member-role{ font-family:var(--font-mono); font-size:0.55rem; color:var(--ink-dim); margin-top:2px; line-height:1.3; }

  .btn-message-team{ width:100%; background:var(--surface); border:1px solid var(--line-strong); color:var(--ink); border-radius:12px; padding:0.9rem; text-align:center; text-decoration:none; font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.08em; text-transform:uppercase; display:block; margin-top:1rem; }
  .btn-message-team:hover{ border-color:var(--gold-line); }

  .bottom-nav{ position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:space-around; align-items:center; background:rgba(10,10,10,0.92); backdrop-filter:blur(10px); border-top:1px solid var(--line); padding:10px 8px calc(10px + var(--safe-bottom)); z-index:20; }
  .nav-item{ background:transparent; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-dim); font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.03em; flex:1; padding:4px 0; }
  .nav-item.active{ color:var(--gold); }
  .nav-item .nav-ic{ font-size:1.15rem; }
  .nav-center{ width:46px; height:46px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #F3DFA3, var(--gold) 55%, #8a6c26 100%); display:flex; align-items:center; justify-content:center; margin-top:-22px; box-shadow:0 4px 14px rgba(201,162,75,0.4); border:2px solid var(--bg); flex:none; }
  .nav-center span{ font-size:1.2rem; }

  .install-banner{ background:var(--gold-soft); border:1px solid var(--gold-line); border-radius:14px; padding:1rem 1.1rem; margin-bottom:14px; display:flex; align-items:center; gap:12px; }
  .install-banner p{ flex:1; font-size:0.85rem; color:var(--ink); line-height:1.5; }
  .install-banner button{ background:var(--gold); color:#151208; border-radius:8px; padding:0.5rem 0.9rem; font-size:0.78rem; font-weight:600; white-space:nowrap; }

  .loading{ text-align:center; padding:3rem 0; color:var(--ink-muted); font-family:var(--font-mono); font-size:0.85rem; }
  .fine{ font-family:var(--font-mono); font-size:0.68rem; color:var(--ink-dim); text-align:center; margin-top:1rem; }

  /* NOVA chat (mismo patrón que dezawavip.html) */
  .nova-header{ display:flex; align-items:center; gap:8px; margin-bottom:1rem; }
  .nova-header .nova-dot{ width:8px; height:8px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px var(--gold); animation:pulse 2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }
  .nova-messages{ max-height:50vh; overflow-y:auto; display:flex; flex-direction:column; gap:0.7rem; margin-bottom:1rem; padding-right:4px; }
  .nova-msg{ max-width:88%; padding:0.7rem 0.95rem; border-radius:12px; font-size:0.92rem; line-height:1.55; }
  .nova-msg--user{ align-self:flex-end; background:var(--gold-soft); border:1px solid var(--gold-line); border-bottom-right-radius:3px; }
  .nova-msg--nova{ align-self:flex-start; background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:3px; }
  .nova-typing{ align-self:flex-start; display:flex; gap:4px; padding:0.7rem 0.95rem; }
  .nova-typing span{ width:6px; height:6px; border-radius:50%; background:var(--ink-dim); animation:novaBlink 1.2s infinite; }
  .nova-typing span:nth-child(2){ animation-delay:.2s; } .nova-typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes novaBlink{ 0%,80%,100%{opacity:.3;} 40%{opacity:1;} }
  .nova-input-row{ display:flex; gap:8px; }
  .nova-input-row input{ flex:1; background:var(--surface); border:1px solid var(--line-strong); color:var(--ink); border-radius:10px; padding:0.8rem 1rem; font-size:0.92rem; outline:none; }
  .nova-input-row input:focus{ border-color:var(--gold); }
  .nova-input-row button{ background:var(--gold); color:#151208; border-radius:10px; padding:0 1.1rem; font-weight:600; }
  .nova-input-row button:disabled{ opacity:.45; }
</style>
</head>
<body>
<div id="bg-video-layer">
  <video autoplay muted loop playsinline preload="auto">
    <source src="/assets/bg-nebula.mp4" type="video/mp4">
  </video>
</div>
<div id="app"><div class="loading">Cargando…</div></div>

<script>
(function(){
  var app = document.getElementById('app');
  var WHATSAPP_NUMBER = '526671264060';
  var STORAGE_KEY = 'ccvip_device';

  /* ─── Airtable vía proxy ─── */
  function atList(filtro){
    return fetch('/api/airtable?tabla=pacientes_vip&filterByFormula=' + encodeURIComponent(filtro) + '&maxRecords=1')
      .then(function(r){ return r.json(); });
  }
  function atUpdate(recordId, fields){
    return fetch('/api/airtable?tabla=pacientes_vip&recordId=' + recordId, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ fields: fields, typecast: true })
    }).then(function(r){
      return r.json().then(function(data){
        if(!r.ok){ throw new Error((data.error && data.error.message) || 'Error al guardar'); }
        return data;
      });
    });
  }

  /* ─── Utilidades ─── */
  async function sha256(text){
    var enc = new TextEncoder().encode(text);
    var buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }
  function getLocalDevice(){
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e){ return null; }
  }
  function setLocalDevice(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function clearLocalDevice(){ localStorage.removeItem(STORAGE_KEY); }

  /* ─── Service worker + instalación ─── */
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw-vip.js').catch(function(){});
  }
  var deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredInstallPrompt = e;
    renderInstallBanner();
  });
  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  function isIOS(){
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
  }
  function renderInstallBanner(){
    var slot = document.getElementById('install-banner-slot');
    if(!slot || isStandalone()) return;
    if(localStorage.getItem('ccvip_install_dismissed') === '1') return;

    if(deferredInstallPrompt){
      slot.innerHTML =
        '<div class="install-banner">' +
          '<p>Instala CODE CELLS VIP en tu pantalla de inicio — acceso directo, sin buscar la liga.</p>' +
          '<button type="button" id="btn-install">Instalar</button>' +
        '</div>';
      document.getElementById('btn-install').addEventListener('click', function(){
        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.finally(function(){
          deferredInstallPrompt = null;
          slot.innerHTML = '';
        });
      });
    } else if(isIOS()){
      slot.innerHTML =
        '<div class="install-banner">' +
          '<p>Instala esta app: toca el ícono de compartir <strong>⬆</strong> y elige "Agregar a pantalla de inicio".</p>' +
          '<button type="button" id="btn-dismiss-install">Entendido</button>' +
        '</div>';
      document.getElementById('btn-dismiss-install').addEventListener('click', function(){
        localStorage.setItem('ccvip_install_dismissed', '1');
        slot.innerHTML = '';
      });
    }
  }

  /* ─── Arranque ─── */
  var record = null; // registro Airtable actual (cargado o refrescado)
  var pinBuffer = '';
  var pinStage = null; // 'crear' | 'confirmar' (durante activación)
  var pinFirstEntry = '';
  var failedAttempts = 0;

  function init(){
    var params = new URLSearchParams(window.location.search);
    var setupToken = params.get('setup');
    var codigoDirecto = params.get('codigo');

    if(setupToken){
      renderLoading();
      atList('{Token activación}="' + setupToken.replace(/"/g,'') + '"').then(function(data){
        if(!data.records || !data.records.length){ return renderInvalid('token_invalid'); }
        record = data.records[0];
        if(record.fields['Activado']){ return renderInvalid('token_usado'); }
        renderBienvenidaActivacion();
      }).catch(function(){ renderInvalid('error'); });
      return;
    }

    if(codigoDirecto){
      renderLoading();
      atList('{Código DZW}="' + codigoDirecto.replace(/"/g,'') + '"').then(function(data){
        if(!data.records || !data.records.length){ return renderInvalid('codigo_no_encontrado'); }
        record = data.records[0];
        renderDashboard();
      }).catch(function(){ renderInvalid('error'); });
      return;
    }

    var local = getLocalDevice();
    if(local && local.dzw && local.pinHash){
      renderPinUnlock(local);
    } else {
      renderSinCuenta();
    }
  }

  function renderLoading(){
    app.innerHTML = '<div class="center-screen"><div class="loading">Cargando tu portal…</div></div>';
  }

  function renderInvalid(reason){
    var msgs = {
      token_invalid: ['Liga no válida', 'Este enlace de activación no es válido. Pide a tu especialista que te reenvíe la liga.'],
      token_usado:   ['Ya activaste tu cuenta', 'Este dispositivo o cuenta ya fue activado. Abre la app desde tu pantalla de inicio, o pide ayuda a tu especialista si no la encuentras.'],
      codigo_no_encontrado: ['Código no encontrado', 'No existe ninguna cuenta VIP con ese código DZW.'],
      error:         ['Algo salió mal', 'No pudimos cargar tu liga en este momento. Intenta de nuevo en unos minutos.']
    };
    var m = msgs[reason] || msgs.error;
    app.innerHTML =
      '<div class="center-screen">' +
        '<div class="eyebrow"><span class="dot"></span>CODE CELLS® VIP</div>' +
        '<div class="card"><h1>' + m[0] + '</h1><p class="lede">' + m[1] + '</p></div>' +
      '</div>';
  }

  function renderSinCuenta(){
    app.innerHTML =
      '<div class="center-screen">' +

  /* ─── Teclado de PIN reutilizable (crear / confirmar / desbloquear) ─── */
  function renderPinPad(errorMsg){
    var titles = {
      crear:      'Crea tu PIN',
      confirmar:  'Confírmalo de nuevo',
      unlock:     'Ingresa tu PIN'
    };
    var subtitles = {
      crear:      '4 a 6 dígitos. Lo usarás para entrar cada vez.',
      confirmar:  'Escríbelo una vez más para confirmar.',
      unlock:     ''
    };
    var maxDots = 6;
    var dotsHtml = '';
    for(var i=0;i<maxDots;i++){ dotsHtml += '<span class="' + (i < pinBuffer.length ? 'filled' : '') + '"></span>'; }

    var keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
    var keysHtml = keys.map(function(k){
      if(k === '') return '<div class="pin-key empty"></div>';
      return '<button type="button" class="pin-key" data-key="' + k + '">' + k + '</button>';
    }).join('');

    app.innerHTML =
      '<div class="center-screen">' +
        '<div class="eyebrow"><span class="dot"></span>' + (pinStage === 'unlock' ? 'CODE CELLS® VIP' : 'Activación de cuenta') + '</div>' +
        '<div class="card" style="text-align:center;">' +
          '<h2>' + titles[pinStage] + '</h2>' +
          (subtitles[pinStage] ? '<p class="lede" style="margin-bottom:0.4rem;">' + subtitles[pinStage] + '</p>' : '') +
          '<div class="pin-dots">' + dotsHtml + '</div>' +
          '<div class="error-msg">' + (errorMsg || '') + '</div>' +
          '<div class="pin-keypad">' + keysHtml + '</div>' +
        '</div>' +
      '</div>';

    app.querySelectorAll('.pin-key[data-key]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var k = btn.getAttribute('data-key');
        if(k === '⌫'){ pinBuffer = pinBuffer.slice(0,-1); renderPinPad(); return; }
        if(pinBuffer.length >= maxDots) return;
        pinBuffer += k;
        if(pinBuffer.length >= 4){
          // Auto-avanza cuando llega a 4+ dígitos y el usuario hace una pausa breve,
          // pero permitimos hasta 6: mostramos botón implícito vía doble tap en ⌫ no aplica.
          // Simplificamos: confirmamos automáticamente al llegar a 4 dígitos si no seguirán tecleando.
        }
        renderPinPad();
        if(pinBuffer.length === maxDots){ handlePinComplete(); }
        else if(pinBuffer.length >= 4){
          clearTimeout(window._pinTimer);
          window._pinTimer = setTimeout(function(){ if(pinBuffer.length >= 4) handlePinComplete(); }, 700);
        }
      });
    });
  }

  function handlePinComplete(){
    if(pinStage === 'crear'){
      pinFirstEntry = pinBuffer;
      pinStage = 'confirmar';
      pinBuffer = '';
      renderPinPad();
    } else if(pinStage === 'confirmar'){
      if(pinBuffer !== pinFirstEntry){
        pinBuffer = ''; pinStage = 'crear'; pinFirstEntry = '';
        renderPinPad('Los PIN no coinciden. Intenta de nuevo.');
        return;
      }
      finalizarActivacion(pinBuffer);
    } else if(pinStage === 'unlock'){
      verificarPinLocal(pinBuffer);
    }
  }

  async function finalizarActivacion(pin){
    app.innerHTML = '<div class="center-screen"><div class="loading">Configurando tu cuenta…</div></div>';
    var hash = await sha256(pin);
    var codigoDZW = record.fields['Código DZW'];
    try {
      await atUpdate(record.id, {
        'PIN_hash': hash,
        'Activado': true,
        'Fecha activación': new Date().toISOString()
      });
      setLocalDevice({ dzw: codigoDZW, pinHash: hash });
      record.fields['Activado'] = true;
      // Limpia el ?setup= de la URL para que no se reintente
      window.history.replaceState({}, '', '/portal-vip.html');
      renderDashboard();
    } catch(err){
      app.innerHTML =
        '<div class="center-screen"><div class="card"><h2>No pudimos activar tu cuenta</h2>' +
        '<p class="lede">Intenta de nuevo en unos minutos.</p>' +
        '<button class="btn-gold" type="button" id="retry-activar">Reintentar</button></div></div>';
      document.getElementById('retry-activar').addEventListener('click', function(){ finalizarActivacion(pin); });

  }

  async function verificarPinLocal(pin){
    var local = getLocalDevice();
    var hash = await sha256(pin);
    if(local && hash === local.pinHash){
      failedAttempts = 0;
      renderLoading();
      // Refresca datos frescos desde Airtable usando el código DZW guardado localmente
      atList('{Código DZW}="' + local.dzw + '"').then(function(data){
        if(data.records && data.records.length){
          record = data.records[0];
        } else {
          record = { fields: {} }; // modo degradado si no hay red/registro
        }
        renderDashboard();
      }).catch(function(){
        record = { fields: {} };
        renderDashboard();
      });
    } else {
      failedAttempts++;
      pinBuffer = '';
      if(failedAttempts >= 5){
        renderPinPad('Demasiados intentos. Si olvidaste tu PIN, pide ayuda a tu especialista.');
      } else {
        renderPinPad('PIN incorrecto. Intenta de nuevo.');
      }
    }
  }

    var protocolo = f['Protocolo'] || 'DEZAWA PROTOCOL™';
    window._novaSystemPrompt = SYSTEM_BASE.replace(/__NOMBRE__/g, nombre || 'paciente').replace(/__PROTOCOLO__/g, protocolo);

    app.innerHTML =
      '<div class="topbar"><button class="btn-icon" id="btn-nova-back">←</button><div class="topbar-brand"><span class="dot"></span>NOVA</div><div style="width:36px;"></div></div>' +
      '<div class="card">' +
        '<div class="nova-messages" id="nova-messages"></div>' +
        '<div class="nova-input-row">' +
          '<input type="text" id="nova-input" placeholder="Escribe tu pregunta…" autocomplete="off">' +
          '<button type="button" id="nova-send">↑</button>' +
        '</div>' +
      '</div>';

    document.getElementById('btn-nova-back').addEventListener('click', renderDashboard);
    document.getElementById('nova-send').addEventListener('click', novaSend);
    document.getElementById('nova-input').addEventListener('keydown', function(e){ if(e.key === 'Enter') novaSend(); });

    if(novaHistory.length === 0){
      var msg = 'Hola NOVA, tengo una duda sobre mi seguimiento del ' + protocolo + '.';
      novaHistory.push({ role:'user', content: msg });
      renderNovaMessage(msg, 'user');
      novaRespond();
    } else {
      novaHistory.forEach(function(m){ renderNovaMessage(m.content, m.role === 'user' ? 'user' : 'nova'); });
    }
  }

  function parseMarkdown(text){
    return (text||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
  }
  function renderNovaMessage(text, who){
    var messages = document.getElementById('nova-messages');
    if(!messages) return;
    var div = document.createElement('div');
    div.className = 'nova-msg nova-msg--' + who;
    div.innerHTML = parseMarkdown(text);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }
  function novaShowTyping(){
    var messages = document.getElementById('nova-messages');
    if(!messages) return;
    var div = document.createElement('div'); div.className='nova-typing'; div.id='nova-typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div); messages.scrollTop = messages.scrollHeight;
  }
  function novaHideTyping(){ var el = document.getElementById('nova-typing'); if(el) el.remove(); }

  function novaRespond(){
    if(novaIsLoading) return;
    novaIsLoading = true;
    var btn = document.getElementById('nova-send'); if(btn) btn.disabled = true;
    novaShowTyping();
    fetch(NOVA_ENDPOINT, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model: NOVA_MODEL, max_tokens: 1024, system: window._novaSystemPrompt, messages: novaHistory })
    }).then(function(r){ return r.json(); })
    .then(function(data){
      novaHideTyping();
      var reply = (data.content && data.content[0] && data.content[0].text) || 'Hubo un problema al conectar con NOVA.';
      novaHistory.push({ role:'assistant', content: reply });
      renderNovaMessage(reply, 'nova');
    }).catch(function(){
      novaHideTyping();
      renderNovaMessage('Hubo un problema de conexión. Intenta de nuevo.', 'nova');
    }).finally(function(){
      novaIsLoading = false;
      var b = document.getElementById('nova-send'); var i = document.getElementById('nova-input');
      if(b) b.disabled = false; if(i) i.focus();
    });
  }
  function novaSend(){
    var input = document.getElementById('nova-input');
    var text = input.value.trim();
    if(!text || novaIsLoading) return;
    input.value = '';
    novaHistory.push({ role:'user', content: text });
    renderNovaMessage(text, 'user');
    novaRespond();
  }

  init();
})();
</script>
</body>
</html>
