<!DOCTYPE html>
<html lang="es" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="es">
<meta name="robots" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODE CELLS™ — The Biological Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1410;--bg-alt:#121810;
  --surface:#1A211B;--surface-2:#202820;
  --ink:#F2EFE6;--ink-muted:#A9B3A4;--ink-dim:#6E786C;
  --line:rgba(242,239,230,0.12);--line-strong:rgba(242,239,230,0.22);
  --c-energy:#E8A33D;--c-repair:#D4654A;--c-balance:#4FA8A0;
  --c-neuro:#8B7FD4;--c-regen:#5FAE6E;
  --font-display:"Fraunces",serif;
  --font-title:"Syncopate",sans-serif;
  --font-body:"IBM Plex Sans",sans-serif;
  --font-mono:"IBM Plex Mono",monospace;
  --ease:cubic-bezier(.16,.84,.44,1);
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font-body);font-weight:300;color:var(--ink);-webkit-font-smoothing:antialiased;}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
a{color:inherit;text-decoration:none;}

/* ── AMBIENT CELLS ──────────────────────────────── */
.bg-cells{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.bg-cells span{
  position:absolute;border-radius:50%;filter:blur(70px);opacity:0.14;
  animation:drift 50s ease-in-out infinite;
}
.bg-cells span:nth-child(1){width:38vw;height:38vw;background:var(--c-energy);top:-8%;left:-6%;animation-duration:52s;}
.bg-cells span:nth-child(2){width:30vw;height:30vw;background:var(--c-neuro);top:20%;right:-10%;animation-duration:60s;animation-delay:-10s;}
.bg-cells span:nth-child(3){width:34vw;height:34vw;background:var(--c-balance);bottom:-10%;left:18%;animation-duration:55s;animation-delay:-22s;}
.bg-cells span:nth-child(4){width:24vw;height:24vw;background:var(--c-repair);bottom:8%;right:14%;animation-duration:46s;animation-delay:-6s;}
.bg-cells span:nth-child(5){width:26vw;height:26vw;background:var(--c-regen);top:48%;left:42%;animation-duration:64s;animation-delay:-30s;}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(4%,6%) scale(1.08);}
  66%{transform:translate(-5%,-3%) scale(0.94);}
}

/* ── PROGRESS ───────────────────────────────────── */
#prog{position:fixed;top:0;left:0;right:0;z-index:200;height:1.5px;background:var(--line);}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--c-balance),var(--c-energy));transition:width .6s var(--ease);width:0%;}

/* ── ENTRY ──────────────────────────────────────── */
#entry{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  transition:opacity .9s var(--ease),visibility .9s;
}
#entry.hide{opacity:0;visibility:hidden;pointer-events:none;}

#entry-bg{
  position:absolute;inset:0;
  background-image:var(--hero);
  background-size:cover;background-position:center 35%;
}
#entry-ov{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(14,20,16,.45) 0%,rgba(14,20,16,.75) 55%,var(--bg) 100%);
}
#entry-inner{position:relative;z-index:2;padding:2rem;max-width:600px;}

.entry-logo{ display:none; }

.entry-eyebrow{
  font-family:var(--font-mono);font-size:.68rem;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:1.2rem;
}

.entry-h1{
  font-family:var(--font-title);font-weight:700;
  font-size:clamp(1.6rem,4vw,2.8rem);line-height:1;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;
}

.entry-sub{
  font-family:var(--font-display);font-style:italic;font-weight:300;
  font-size:clamp(.95rem,2vw,1.3rem);color:var(--ink-muted);
  margin-bottom:2.8rem;letter-spacing:.06em;
}

.voice-label{
  font-family:var(--font-mono);font-size:.62rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:.8rem;
}

.voice-wrap{display:flex;gap:.7rem;justify-content:center;margin-bottom:2rem;}

.vbtn{
  font-family:var(--font-mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--line-strong);border-radius:100px;
  padding:.7rem 1.4rem;color:var(--ink-muted);
  transition:border-color .3s var(--ease),background .3s var(--ease),color .3s var(--ease);
}
.vbtn:hover{border-color:var(--ink-muted);}
.vbtn.on{
  border-color:var(--ink);background:var(--ink);color:var(--bg);
}

#btnStart{
  font-family:var(--font-mono);font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;
  background:var(--ink);color:var(--bg);
  padding:1rem 1.8rem;border-radius:100px;
  transition:transform .35s var(--ease),background .35s var(--ease);
  display:inline-flex;align-items:center;gap:.6rem;
}
#btnStart:hover{transform:translateY(-2px);background:#fff;}

.entry-note{
  margin-top:1.2rem;
  font-family:var(--font-mono);font-size:.58rem;
  letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);
}

/* ── SLIDES CONTAINER ───────────────────────────── */
#slides{position:fixed;inset:0;z-index:1;}

/* ── SLIDE ──────────────────────────────────────── */
.slide{
  position:absolute;inset:0;overflow:hidden;
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .9s var(--ease),visibility .9s;
}
.slide.active{opacity:1;visibility:visible;pointer-events:all;}

.s-bg{
  position:absolute;inset:0;background-size:cover;background-position:center;
  transform:scale(1.04);transition:transform 14s ease-out;
}
.slide.active .s-bg{transform:scale(1);}

.s-ov{
  position:absolute;inset:0;
  background:linear-gradient(
    180deg,rgba(14,20,16,.42) 0%,rgba(14,20,16,.22) 38%,
    rgba(14,20,16,.55) 65%,rgba(14,20,16,.95) 100%
  );
}
.s-ov2{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(14,20,16,.62) 0%,transparent 44%,transparent 56%,rgba(14,20,16,.35) 100%);
}

/* topbar */
/* brand watermark bottom-left */
.s-brand{
  position:absolute;bottom:clamp(5rem,12vh,8rem);left:clamp(1.5rem,4vw,3rem);
  z-index:10;display:flex;align-items:center;gap:.5rem;opacity:.45;
  transition:opacity .3s;
}
.s-brand:hover{opacity:.75;}
.s-brand img{height:20px;width:auto;
  filter:invert(1) sepia(1) saturate(1.5) hue-rotate(5deg) brightness(1.1);
  mix-blend-mode:screen;}
.s-brand span{
  font-family:var(--font-mono);font-size:.55rem;
  letter-spacing:.12em;color:var(--ink-dim);text-transform:uppercase;
}

/* content */
.s-content{
  position:relative;z-index:2;
  width:100%;max-width:1080px;
  padding:clamp(1.5rem,4vw,3rem);
  padding-bottom:clamp(7rem,15vh,11rem);
  margin:0 auto;height:100%;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.s-content.centered{
  align-items:center;justify-content:center;text-align:center;
  padding-bottom:clamp(7rem,15vh,11rem);
}

.s-eyebrow{
  font-family:var(--font-mono);font-size:.6rem;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:1.1rem;
  display:flex;align-items:center;gap:.5rem;
}
.s-eyebrow .accent{
  color:var(--c-energy);font-size:.7rem;
  font-weight:700;letter-spacing:.1em;
}
.s-eyebrow::before{
  content:'';display:inline-block;width:18px;height:1px;
  background:var(--c-energy);opacity:.6;flex-shrink:0;
}

.s-title{
  font-family:var(--font-title);font-weight:700;
  font-size:clamp(1.4rem,3vw,2.4rem);line-height:1.1;
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem;
}
.s-title.hero{
  font-size:clamp(1.6rem,3.8vw,2.8rem);letter-spacing:.08em;
}
.s-title em{
  font-family:var(--font-display);font-style:italic;
  font-weight:300;color:var(--ink-muted);
  letter-spacing:-.01em;text-transform:none;font-size:.88em;
}

.s-subtitle{
  font-family:var(--font-display);font-style:italic;font-weight:300;
  font-size:clamp(1.1rem,2.2vw,1.5rem);color:var(--ink-muted);
  margin-bottom:.9rem;letter-spacing:.04em;
}

.s-body{
  color:var(--ink-muted);font-size:clamp(.9rem,1.35vw,1.02rem);
  line-height:1.85;max-width:54ch;font-weight:300;
}
.s-content.centered .s-body{margin:0 auto;}

.s-hero-logo{display:none;}

.s-tags{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:1rem;}
.s-content.centered .s-tags{justify-content:center;}
.s-tag{
  font-family:var(--font-mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--line-strong);border-radius:100px;
  padding:.28rem .8rem;color:var(--ink-muted);
  background:rgba(242,239,230,.04);
}
.s-tag.energy{border-color:rgba(232,163,61,.4);color:var(--c-energy);background:rgba(232,163,61,.06);}
.s-tag.repair{border-color:rgba(212,101,74,.4);color:var(--c-repair);background:rgba(212,101,74,.06);}
.s-tag.balance{border-color:rgba(79,168,160,.4);color:var(--c-balance);background:rgba(79,168,160,.06);}
.s-tag.neuro{border-color:rgba(139,127,212,.4);color:var(--c-neuro);background:rgba(139,127,212,.06);}
.s-tag.regen{border-color:rgba(95,174,110,.4);color:var(--c-regen);background:rgba(95,174,110,.06);}

/* ── SLIDE NOVA NEBULOSA ─────────────────────────── */
.nova-nebula-slide {
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:2rem;
  z-index:2;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* Nebulosa animada */
.nebula {
  position:absolute;inset:0;
  overflow:hidden;
  pointer-events:none;
}
.nebula-core {
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(ellipse at center,
    rgba(201,169,110,0.12) 0%,
    rgba(79,168,160,0.08) 30%,
    rgba(139,127,212,0.05) 60%,
    transparent 75%
  );
  animation:nebula-pulse 4s ease-in-out infinite;
}
@keyframes nebula-pulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); opacity:0.7; }
  50% { transform:translate(-50%,-50%) scale(1.15); opacity:1; }
}

.nebula-ring {
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border:0.5px solid rgba(201,169,110,0.15);
  border-radius:50%;
  animation:ring-expand 3s ease-out infinite;
}
.nebula-ring:nth-child(2) { animation-delay:1s; }
.nebula-ring:nth-child(3) { animation-delay:2s; }
@keyframes ring-expand {
  0% { width:100px;height:100px;opacity:0.8; }
  100% { width:500px;height:500px;opacity:0; }
}

/* NOVA avatar holográfico */
.nova-holo {
  position:relative;
  z-index:2;
  width:110px;height:110px;
  margin:0 auto 1.5rem;
  animation:nova-appear 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes nova-appear {
  from { transform:scale(0) rotate(-10deg); opacity:0; }
  to   { transform:scale(1) rotate(0deg); opacity:1; }
}

.nova-holo-ring {
  position:absolute;inset:-8px;
  border-radius:50%;
  border:1.5px solid var(--c-balance);
  animation:holo-spin 6s linear infinite;
  box-shadow:0 0 20px rgba(79,168,160,0.3), inset 0 0 20px rgba(79,168,160,0.1);
}
.nova-holo-ring-2 {
  position:absolute;inset:-16px;
  border-radius:50%;
  border:0.5px solid rgba(201,169,110,0.3);
  animation:holo-spin 10s linear infinite reverse;
}
@keyframes holo-spin {
  to { transform:rotate(360deg); }
}

.nova-holo-face {
  width:100%;height:100%;
  border-radius:50%;
  background:radial-gradient(ellipse at 40% 35%,
    rgba(79,168,160,0.25),
    rgba(14,20,16,0.95) 70%
  );
  border:1px solid rgba(79,168,160,0.4);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 32px rgba(79,168,160,0.2), 0 0 60px rgba(201,169,110,0.1);
  font-family:var(--font-body);
  font-size:11px;
  letter-spacing:0.2em;
  color:var(--c-balance);
  overflow:hidden;
}

/* Partículas de la nebulosa */
.nebula-particle {
  position:absolute;
  border-radius:50%;
  animation:float-particle linear infinite;
}
@keyframes float-particle {
  0% { transform:translateY(0) translateX(0); opacity:0; }
  20% { opacity:1; }
  80% { opacity:1; }
  100% { transform:translateY(-200px) translateX(var(--dx)); opacity:0; }
}

/* Texto NOVA */
.nova-slide-eyebrow {
  font-family:var(--font-body);
  font-size:11px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--c-balance);
  margin-bottom:1rem;
  animation:fade-up 0.8s 0.8s both;
}

.nova-slide-title {
  font-family:var(--font-display);
  font-size:clamp(32px,5vw,56px);
  font-weight:300;
  color:var(--ink);
  line-height:1.1;
  margin-bottom:1rem;
  animation:fade-up 0.8s 1s both;
}
.nova-slide-title em { font-style:italic; color:var(--c-energy); }

.nova-slide-body {
  font-family:var(--font-body);
  font-size:15px;
  color:var(--ink-muted);
  max-width:560px;
  line-height:1.8;
  margin:0 auto 2rem;
  animation:fade-up 0.8s 1.2s both;
}

@keyframes fade-up {
  from { transform:translateY(16px); opacity:0; }
  to   { transform:translateY(0); opacity:1; }
}

/* Chat NOVA en slide */
.nova-slide-chat {
  width:100%;max-width:520px;
  margin:0 auto;
  background:rgba(14,20,16,0.85);
  border:0.5px solid rgba(201,169,110,0.2);
  border-radius:14px;
  overflow:hidden;
  animation:fade-up 0.8s 1.4s both;
  backdrop-filter:blur(8px);
  /* Panel de altura acotada: encabezado + input SIEMPRE visibles,
     solo la lista de mensajes crece/hace scroll internamente. */
  display:flex;flex-direction:column;
  max-height:min(52vh,460px);
}

.nova-chat-hdr {
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;
  background:rgba(26,33,27,0.9);
  border-bottom:0.5px solid rgba(242,239,230,0.08);
  flex-shrink:0;
}
.nova-chat-dot {
  width:7px;height:7px;border-radius:50%;
  background:var(--c-energy);
  animation:pulse-n 2s ease-in-out infinite;
}
@keyframes pulse-n {
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.4;transform:scale(0.7);}
}
.nova-chat-name {
  font-family:var(--font-body);font-size:11px;
  letter-spacing:0.14em;color:var(--c-energy);font-weight:500;
}
.nova-chat-sub {
  font-family:var(--font-body);font-size:9px;
  color:var(--ink-dim);letter-spacing:0.1em;margin-left:2px;
}

.nova-msgs {
  padding:16px;
  display:flex;flex-direction:column;gap:10px;
  flex:1 1 auto;min-height:80px;
  overflow-y:auto;
}
.nova-msgs::-webkit-scrollbar{width:2px;}
.nova-msgs::-webkit-scrollbar-thumb{background:rgba(242,239,230,0.1);border-radius:2px;}

.n-msg{display:flex;}
.n-msg--n{justify-content:flex-start;}
.n-msg--u{justify-content:flex-end;}
.n-bubble{
  max-width:84%;padding:10px 13px;border-radius:9px;
  font-family:var(--font-body);font-size:13px;line-height:1.65;
}
.n-msg--n .n-bubble{
  background:rgba(26,33,27,0.9);
  border:0.5px solid rgba(242,239,230,0.08);
  color:var(--ink);border-bottom-left-radius:2px;
}
.n-msg--u .n-bubble{
  background:rgba(201,169,110,0.12);
  border:0.5px solid rgba(201,169,110,0.2);
  color:var(--ink);border-bottom-right-radius:2px;
}
.n-typing{display:flex;gap:4px;padding:10px 13px;align-items:center;}
.n-typing span{
  width:5px;height:5px;border-radius:50%;
  background:rgba(201,169,110,0.5);
  animation:ndot 1.2s ease-in-out infinite;
}
.n-typing span:nth-child(2){animation-delay:.2s;}
.n-typing span:nth-child(3){animation-delay:.4s;}
@keyframes ndot{
  0%,60%,100%{transform:translateY(0);opacity:.4;}
  30%{transform:translateY(-4px);opacity:1;}
}

.nova-input-area{
  display:flex;gap:8px;
  padding:12px 16px;
  border-top:0.5px solid rgba(242,239,230,0.08);
  background:rgba(26,33,27,0.9);
  flex-shrink:0;
}
.nova-input-area input{
  flex:1;background:rgba(242,239,230,0.04);
  border:0.5px solid rgba(242,239,230,0.1);
  border-radius:6px;
  color:var(--ink) !important;
  -webkit-text-fill-color:var(--ink) !important;
  font-family:var(--font-body);font-size:13px;
  padding:9px 12px;outline:none;
  caret-color:var(--c-energy);
  transition:border-color .2s;
}
.nova-input-area input:focus{border-color:rgba(201,169,110,0.35);}
.nova-input-area input::placeholder{color:var(--ink-dim);}
.nova-send-btn{
  width:36px;height:36px;border-radius:6px;
  background:var(--c-energy);border:none;
  color:#06200F;font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;flex-shrink:0;
}
.nova-send-btn:hover{background:#f0b84a;}
.nova-send-btn:disabled{background:rgba(232,163,61,0.3);cursor:not-allowed;}

/* slide line divider */
.s-line{
  width:36px;height:1px;
  background:linear-gradient(90deg,var(--c-energy),transparent);
  margin:1.4rem 0;opacity:.7;
}
.s-content.centered .s-line{margin:1.4rem auto;}

/* ── DOTS ───────────────────────────────────────── */
#dots{
  position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%);
  z-index:50;display:flex;gap:.55rem;align-items:center;
  transition:opacity .4s;
}
#dots.off{opacity:0;pointer-events:none;}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--line-strong);transition:all .4s var(--ease);cursor:pointer;
}
.dot.on{background:var(--ink);transform:scale(1.5);}
.dot:hover{background:var(--ink-muted);}

/* ── AUDIO BAR ──────────────────────────────────── */
#abar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:.85rem clamp(1rem,4vw,2.5rem);
  background:linear-gradient(180deg,transparent,rgba(14,20,16,.97));
  display:flex;align-items:center;gap:1rem;
  transition:opacity .5s;
}
#abar.off{opacity:0;pointer-events:none;}

#ppBtn{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--line-strong);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .3s var(--ease),background .3s var(--ease);
  background:rgba(242,239,230,.04);
}
#ppBtn:hover{border-color:var(--ink-muted);background:rgba(242,239,230,.08);}
#ppBtn svg{width:12px;height:12px;fill:var(--ink-muted);}

.a-track{
  flex:1;height:1.5px;background:var(--line);
  border-radius:2px;cursor:pointer;position:relative;overflow:hidden;
}
.a-fill{
  position:absolute;left:0;top:0;height:100%;width:0%;
  background:linear-gradient(90deg,var(--c-balance),var(--c-energy));
  transition:width .25s linear;
}

#a-time{
  font-family:var(--font-mono);font-size:.6rem;
  color:var(--ink-dim);letter-spacing:.04em;flex-shrink:0;

const _preloaded = new Set();
function preloadAudio(url){
  if(!url || _preloaded.has(url)) return;
  _preloaded.add(url);
  try{ const a=new Audio(); a.preload='auto'; a.src=url; }catch(e){}

// ── RESUME GLOBAL (si el navegador bloquea un play() automático) ────
// Si Chrome bloquea player.play() por política de autoplay, el SIGUIENTE
// clic o tecla en cualquier parte de la pantalla reintenta reproducir.
let _resumeArmed=false;
function armPlayerResume(retryFn){
  if(_resumeArmed) return;
  _resumeArmed=true;
  const resume=(e)=>{
    const tag=(e?.target && e.target.tagName) || '';
    if(tag==='INPUT' || tag==='TEXTAREA' || e?.target?.isContentEditable) return; // no interceptar mientras se escribe
    _resumeArmed=false;
    document.removeEventListener('click', resume);
    document.removeEventListener('keydown', resume);
    retryFn();
  };
  document.addEventListener('click', resume);
  document.addEventListener('keydown', resume);
}

function _playNextInQueue(){
  clearTimeout(skipTm);
  if(_queue.length===0){ setPlayIcon(false); showContinue(); return; }
  const src=_queue.shift();
  player.src=src;
  player.load();
  // Salvaguarda: si el audio NUNCA arranca (bloqueado/roto) en 8s, saltar al
  // siguiente. Se cancela en cuanto el evento 'play' confirma que sí sonó,
  // así que NUNCA corta una narración que ya está en curso, sin importar
  // cuánto dure.
  skipTm=setTimeout(()=>{ _playNextInQueue(); }, 8000);
  const p=player.play();
  if(p && p.catch){
    p.catch(()=>{
      setPlayIcon(false);
      armPlayerResume(()=>{
        player.play().then(()=>setPlayIcon(true)).catch(()=>_playNextInQueue());
      });
    });
  }
}
player.addEventListener('ended', ()=>{ clearTimeout(skipTm); _playNextInQueue(); });
player.addEventListener('error', ()=>{ clearTimeout(skipTm); _playNextInQueue(); });
player.addEventListener('play',  ()=>{ clearTimeout(skipTm); setPlayIcon(true); });
player.addEventListener('pause', ()=>setPlayIcon(false));
player.addEventListener('timeupdate',()=>{
  if(!player.duration) return;
  aFill.style.width=(player.currentTime/player.duration*100)+'%';
  const rem=Math.max(0,player.duration-player.currentTime);
  aTime.textContent=fmt(rem);
});

function toggleAudio(){ if(player.paused) player.play().catch(()=>{}); else player.pause(); }
function skipAudio(){ clearTimeout(skipTm); _playNextInQueue(); }
function seekAudio(e){
  if(!player.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  player.currentTime=((e.clientX-r.left)/r.width)*player.duration;
}
function setPlayIcon(p){
  document.getElementById('i-play').style.display=p?'none':'block';
  document.getElementById('i-pause').style.display=p?'block':'none';
}
function fmt(s){ const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

function gotoSlide(idx){
  if(idx<0||idx>=SLIDES.length) return;
  clearTimeout(skipTm);

  document.querySelectorAll('.slide')[cur].classList.remove('active');
  document.querySelectorAll('.dot')[cur].classList.remove('on');
  cur=idx;
  document.querySelectorAll('.slide')[cur].classList.add('active');
  document.querySelectorAll('.dot')[cur].classList.add('on');

  progFill.style.width=(cur/(SLIDES.length-1)*100)+'%';
  const isNova = !!SLIDES[cur].nova;
  navPrev.classList.toggle('show', cur>0 && !isNova);
  dotsEl.classList.toggle('off', isNova);
  abar.classList.toggle('off', isNova);
  btnNext.classList.remove('show');
  btnCta.classList.remove('show');
  btnCap.classList.remove('show');

  playSlideAudio(cur);

  // Slide especial NOVA (la última): inicializar chat + partículas,
  // y arrancar directo con el foco puesto en el campo de texto.

    setTimeout(()=>{ document.getElementById('nova-slide-input')?.focus(); }, 700);

function showContinue(){

  // interceptar teclas — dejar que el usuario escriba con normalidad.

const bgMusic = document.getElementById('bgMusic');
const muteBtn = document.getElementById('muteBtn');
let muted = false;

bgMusic.volume = 0.18; // 18% — ambient

function startBgMusic(){
  muteBtn.classList.add('show');
  bgMusic.volume = 0.10;
  bgMusic.play().catch(()=>{
    // file:// autoplay blocked — retry on next user interaction
    const retry = ()=>{
      bgMusic.play().catch(()=>{});
      document.removeEventListener('click', retry);
      document.removeEventListener('keydown', retry);
    };
    document.addEventListener('click',   retry, {once:true});
    document.addEventListener('keydown', retry, {once:true});
  });
}

function toggleMute(){
  muted = !muted;
  bgMusic.volume = muted ? 0 : 0.10;
  document.getElementById('iconSound').style.display = muted ? 'none'  : 'block';
  document.getElementById('iconMute').style.display  = muted ? 'block' : 'none';
  muteBtn.style.opacity = muted ? '0.9' : '';
}

// Fade music volume while voice is speaking, restore on silence
function fadeBgTo(vol, ms){
  const step = (vol - bgMusic.volume) / (ms / 50);
  const iv = setInterval(()=>{
    if(muted){ clearInterval(iv); return; }
    bgMusic.volume = Math.max(0, Math.min(0.18, bgMusic.volume + step));
    if((step > 0 && bgMusic.volume >= vol) || (step < 0 && bgMusic.volume <= vol)){
      bgMusic.volume = vol; clearInterval(iv);
    }
  }, 50);
}

// Lower music while voice plays, restore when voice ends
player.addEventListener('play',  ()=> fadeBgTo(0.08,  800));

  const colors = ['#C9A96E','#4FA8A0','#8B7FD4','#E8A33D'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'nebula-particle';
    const size = Math.random() * 4 + 1;
    const x = 20 + Math.random() * 60; // % horizontal
    const delay = Math.random() * 4;
    const dur = 3 + Math.random() * 4;
    const dx = (Math.random() - 0.5) * 100;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${x}%;bottom:10%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      opacity:0;
      --dx:${dx}px;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    nebula.appendChild(p);
  }
}

</script>
</body>
</html>
