<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mi CODE CELLS® — Portal Paciente</title>
<link rel="manifest" href="/manifest-paciente.json">
<meta name="theme-color" content="#0E1410">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a; --black-2: #111111; --black-3: #1a1a1a; --black-4: #242424;
    --gold: #C9A96E; --gold-dim: #8a7050; --gold-pale: rgba(201,169,110,0.12); --gold-pale2: rgba(201,169,110,0.06);
    --cyan: #00D4FF; --cyan-pale: rgba(0,212,255,0.10);
    --text-1: #f0ede8; --text-2: #9a9590; --text-3: #5a5550;
    --border: rgba(201,169,110,0.18); --border-dim: rgba(255,255,255,0.06);
    --radius: 10px;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: var(--black) url('assets/nebula-nova.jpg') center/cover fixed no-repeat; color: var(--text-1); font-family: var(--font-sans); }
  body::before { content: ''; position: fixed; inset: 0; background: rgba(10,10,10,0.85); z-index: 0; pointer-events: none; }
  .wrap { position: relative; z-index: 1; }
  .btn-musica {
    position: fixed; top: 16px; right: 16px; z-index: 5; width: 40px; height: 40px; border-radius: 50%;
    background: var(--black-2); border: 1px solid var(--border-dim); color: var(--gold); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 28px 20px 100px; }

  .pantalla { display: none; }
  .pantalla.activa { display: block; }
  .centro { min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; padding: 20px; }
  .loader-grande { width: 32px; height: 32px; border: 2px solid var(--border-dim); border-top-color: var(--gold); border-radius: 50%; animation: girar 0.8s linear infinite; }
  @keyframes girar { to { transform: rotate(360deg); } }

  .logo-glyph { font-family: var(--font-serif); font-size: 13px; letter-spacing: 0.3em; color: var(--gold); font-weight: 300; text-align: center; margin-bottom: 22px; }

  .card-paciente { background: var(--black-2); border: 1px solid var(--border-dim); border-radius: 18px; padding: 26px; margin-bottom: 20px; }
  .card-paciente-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .paciente-nombre { font-family: var(--font-serif); font-size: 26px; font-weight: 400; margin: 0 0 4px; }
  .paciente-codigo { font-family: var(--font-mono); font-size: 11px; color: var(--gold-dim); letter-spacing: 0.08em; }
  .badge-vip { background: var(--gold); color: var(--black); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 5px 12px; border-radius: 20px; white-space: nowrap; }

  .protocolo-box { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-dim); }
  .protocolo-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .protocolo-valor { font-family: var(--font-serif); font-size: 20px; color: var(--gold); }
  .protocolo-vacio { font-size: 13px; color: var(--text-3); font-style: italic; }

  .patologias-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .patologia-chip { font-size: 11px; color: var(--text-2); background: var(--black-3); border: 1px solid var(--border-dim); border-radius: 20px; padding: 4px 10px; }

  .seccion-label { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.12em; margin: 28px 0 14px; }

  /* Chat NOVA */
  .chat-caja { background: var(--black-2); border: 1px solid var(--border-dim); border-radius: 18px; overflow: hidden; }
  .chat-mensajes { max-height: 50vh; min-height: 220px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
  .msg-nova { background: var(--black-3); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg-user { background: var(--gold-pale); color: var(--text-1); align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg-loading { align-self: flex-start; color: var(--text-3); font-size: 13px; font-style: italic; }

  .chat-input-row { display: flex; gap: 8px; padding: 14px; border-top: 1px solid var(--border-dim); }
  .chat-input-row input {
    flex: 1; background: var(--black-3); border: 1px solid var(--border-dim); border-radius: 24px;
    color: var(--text-1); padding: 12px 18px; font-size: 14px; font-family: var(--font-sans);
  }
  .chat-input-row input:focus { outline: none; border-color: var(--gold); }
  .btn-enviar {
    background: var(--gold); color: var(--black); border: none; border-radius: 50%;
    width: 44px; height: 44px; flex-shrink: 0; cursor: pointer; font-size: 18px;
  }
  .btn-enviar:disabled { opacity: 0.4; }

  .sugerencias { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .sugerencia-chip {
    font-size: 12.5px; color: var(--gold); border: 1px solid var(--border); border-radius: 20px;
    padding: 9px 16px; cursor: pointer; background: var(--gold-pale2);
  }

  .error-msg { color: #E2574B; font-size: 14px; }
  .btn-reintentar { margin-top: 8px; background: none; border: 1px solid var(--border-dim); color: var(--text-2); border-radius: 20px; padding: 10px 20px; cursor: pointer; }

  .install-banner { background: var(--gold-pale2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 12px; }
  .install-banner p { flex: 1; font-size: 13px; color: var(--text-1); line-height: 1.5; margin: 0; }
  .install-banner button { background: var(--gold); color: var(--black); border: none; border-radius: 8px; padding: 8px 14px; font-size: 12.5px; font-weight: 600; white-space: nowrap; cursor: pointer; }
</style>
</head>
<body>

<button class="btn-musica" id="btn-musica" onclick="toggleMusica()">🔇</button>
<audio id="musica-fondo" src="assets/helix-in-gold.mp3" loop preload="none"></audio>

  <div class="wrap">
  <div class="logo-glyph">CODE CELLS®</div>
  <div id="install-banner-slot"></div>

  <!-- Pantalla: cargando -->
  <div class="pantalla activa" id="p-cargando">
    <div class="centro">
      <div class="loader-grande"></div>
      <p style="color:var(--text-2);font-size:14px;">Cargando tu información…</p>
    </div>
  </div>

  <!-- Pantalla: error -->
  <div class="pantalla" id="p-error">
    <div class="centro">
      <p class="error-msg" id="error-texto">No pudimos cargar tu información.</p>
      <button class="btn-reintentar" onclick="location.reload()">Reintentar</button>
    </div>
  </div>

  <!-- Pantalla: lista de pacientes (modo médico maestro) -->
  <div class="pantalla" id="p-lista-medico">
    <div class="seccion-label">Pacientes registrados</div>
    <div id="lista-medico-pacientes"></div>
  </div>

  <!-- Pantalla: principal -->
  <div class="pantalla" id="p-principal">
    <div class="card-paciente">
      <div class="card-paciente-top">
        <div>
          <div class="paciente-nombre" id="paciente-nombre">—</div>
          <div class="paciente-codigo" id="paciente-codigo">—</div>
        </div>
        <div class="badge-vip" id="badge-vip" style="display:none;">DEZAWA VIP</div>
      </div>
      <div class="protocolo-box">
        <div class="protocolo-label">Tu protocolo actual</div>
        <div id="protocolo-contenido"></div>
      </div>
      <div class="patologias-chips" id="patologias-chips"></div>
    </div>

    <div class="seccion-label">Subir un estudio</div>
    <div class="chat-caja" style="padding:20px;">
      <p style="font-size:13px;color:var(--text-2);margin:0 0 14px;line-height:1.5;">
        Sube tu laboratorio o estudio en PDF o foto. Solo se agrega a tu expediente si el nombre en el documento coincide con tu registro.
      </p>
      <input type="file" id="input-estudio" accept="application/pdf,image/*" style="display:none;">
      <button class="btn-enviar" id="btn-subir-estudio" style="width:100%;border-radius:24px;font-size:14px;font-weight:600;">📎 Elegir archivo</button>
      <div id="estudio-nombre" style="font-size:12px;color:var(--text-3);margin-top:8px;text-align:center;"></div>
      <div id="estudio-estado" style="font-size:13px;margin-top:10px;text-align:center;min-height:18px;"></div>
    </div>

    <div class="seccion-label">Habla con NOVA</div>
    <div class="chat-caja">
      <div class="chat-mensajes" id="chat-mensajes"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Escribe tu mensaje…" autocomplete="off">
        <button class="btn-enviar" id="btn-enviar" onclick="enviarMensaje()">↑</button>
      </div>
    </div>
    <div class="sugerencias" id="sugerencias-chips"></div>
  </div>
</div>

<script>
var pacienteCodigo = null;
var pacienteRecord = null;
var esVip = false;
var STORAGE_KEY_CODIGO = 'ccpac_codigo';

/* ─── Service worker + instalación como app ─── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw-paciente.js').catch(function(){});
}
var deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredInstallPrompt = e;
  renderInstallBanner();
});
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function renderInstallBanner(){
  var slot = document.getElementById('install-banner-slot');
  if (!slot || isStandalone()) return;
  if (localStorage.getItem('ccpac_install_dismissed') === '1') return;

  if (deferredInstallPrompt) {
    slot.innerHTML =
      '<div class="install-banner">' +
        '<p>Instala CODE CELLS® en tu pantalla de inicio — acceso directo a NOVA, sin buscar la liga.</p>' +
        '<button type="button" id="btn-install">Instalar</button>' +
      '</div>';
    document.getElementById('btn-install').addEventListener('click', function(){
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(function(){
        deferredInstallPrompt = null;
        slot.innerHTML = '';
      });
    });
  } else if (isIOS()) {
    slot.innerHTML =
      '<div class="install-banner">' +
        '<p>Instala esta app: toca el ícono de compartir <strong>⬆</strong> y elige "Agregar a pantalla de inicio".</p>' +
        '<button type="button" id="btn-dismiss-install">Entendido</button>' +
      '</div>';
    document.getElementById('btn-dismiss-install').addEventListener('click', function(){
      localStorage.setItem('ccpac_install_dismissed', '1');
      slot.innerHTML = '';
    });
  } else {
    slot.innerHTML =
      '<div class="install-banner">' +
        '<p>Instala esta app: toca los tres puntos <strong>⋮</strong> arriba a la derecha del navegador y elige "Instalar app" o "Agregar a pantalla de inicio".</p>' +
        '<button type="button" id="btn-dismiss-install">Entendido</button>' +
      '</div>';
    document.getElementById('btn-dismiss-install').addEventListener('click', function(){
      localStorage.setItem('ccpac_install_dismissed', '1');
      slot.innerHTML = '';
    });
  }
}

function toggleMusica() {
  const musica = document.getElementById('musica-fondo');
  const btn = document.getElementById('btn-musica');
  if (musica.paused) {
    musica.volume = 0.25;
    musica.play().catch(function(){});
    btn.textContent = '🔊';
  } else {
    musica.pause();
    btn.textContent = '🔇';
  }
}

function irA(id) {
  document.querySelectorAll('.pantalla').forEach(function(p){ p.classList.remove('activa'); });
  document.getElementById(id).classList.add('activa');
}

function init() {
  var params = new URLSearchParams(window.location.search);
  pacienteCodigo = params.get('codigo');

  if (pacienteCodigo && /^CCMED-/i.test(pacienteCodigo)) {
    cargarListaMedico(pacienteCodigo);
    return;
  }

  if (pacienteCodigo && /^CC-PAC-[0-9]{4,8}$/.test(pacienteCodigo)) {
    // Llegó por liga con código válido — se guarda para futuras aperturas
    // desde el ícono instalado (que abren /mi-nivel.html sin parámetros).
    try { localStorage.setItem(STORAGE_KEY_CODIGO, pacienteCodigo); } catch(e) {}
  } else {
    // Sin código en la URL (típico al abrir desde el ícono instalado) —
    // usar el que se guardó la primera vez que entró por su liga real.
    try { pacienteCodigo = localStorage.getItem(STORAGE_KEY_CODIGO); } catch(e) { pacienteCodigo = null; }
  }

  if (!pacienteCodigo || !/^CC-PAC-[0-9]{4,8}$/.test(pacienteCodigo)) {
    document.getElementById('error-texto').textContent = 'Enlace incompleto o inválido — verifica el código con tu médico.';
    irA('p-error');
    return;
  }
  cargarPaciente();
}

function cargarListaMedico(codigoMedico) {
  irA('p-cargando');
  fetch('/api/airtable?tabla=medicos&filterByFormula=' + encodeURIComponent('{Código de médico}="' + codigoMedico.replace(/"/g,'') + '"'))
    .then(function(r){ return r.json(); })
    .then(function(medData){
      var medico = medData.records && medData.records[0];
      if (!medico || medico.fields['Ver todos los pacientes'] !== true) {
        document.getElementById('error-texto').textContent = 'Código no reconocido para modo médico.';
        irA('p-error');
        return;
      }
      return fetch('/api/airtable?tabla=pacientes&sort[0][field]=Nombre%20completo&sort[0][direction]=asc&maxRecords=200')
        .then(function(r){ return r.json(); })
        .then(function(data){ renderListaMedico(data.records || []); });
    })
    .catch(function(){
      document.getElementById('error-texto').textContent = 'Error de conexión — intenta de nuevo.';
      irA('p-error');
    });
}

function renderListaMedico(pacientes) {
  var lista = document.getElementById('lista-medico-pacientes');
  lista.innerHTML = '';
  if (!pacientes.length) {
    lista.innerHTML = '<p style="color:var(--text-3);font-size:13px;">Aún no hay pacientes registrados.</p>';
  }
  pacientes.forEach(function(p) {
    var f = p.fields;
    var fila = document.createElement('div');
    fila.className = 'card-paciente';
    fila.style.cursor = 'pointer';
    fila.style.marginBottom = '10px';
    fila.innerHTML =
      '<div class="paciente-nombre" style="font-size:17px;">' + (f['Nombre completo'] || 'Sin nombre') + '</div>' +
      '<div class="paciente-codigo">' + (f['Código de paciente'] || '') + (f['Protocolo actual'] ? ' · ' + f['Protocolo actual'] : '') + '</div>';
    fila.addEventListener('click', function(){
      window.location.href = 'mi-nivel.html?codigo=' + (f['Código de paciente'] || '');
    });
    lista.appendChild(fila);
  });
  irA('p-lista-medico');
}

function cargarPaciente() {
  fetch('/api/airtable?tabla=pacientes&filterByFormula=' + encodeURIComponent('{Código de paciente}="' + pacienteCodigo + '"'))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data.records || !data.records.length) {
        document.getElementById('error-texto').textContent = 'No encontramos tu registro — verifica el código con tu médico.';
        irA('p-error');
        return;
      }
      pacienteRecord = data.records[0];
      var f = pacienteRecord.fields;
      esVip = f['Es VIP (DEZAWA)'] === true;

      document.getElementById('paciente-nombre').textContent = f['Nombre completo'] || 'Paciente';
      document.getElementById('paciente-codigo').textContent = pacienteCodigo;
      document.getElementById('badge-vip').style.display = esVip ? 'inline-block' : 'none';

      var protocolo = f['Protocolo actual'];
      document.getElementById('protocolo-contenido').innerHTML = protocolo
        ? '<div class="protocolo-valor">' + protocolo + '</div>'
        : '<div class="protocolo-vacio">Tu médico aún no ha asignado tu protocolo — pregúntale en tu próxima consulta.</div>';

      var patologias = f['Patologías activas'] || [];
      var cont = document.getElementById('patologias-chips');
      cont.innerHTML = '';
      patologias.forEach(function(p){
        var chip = document.createElement('div');
        chip.className = 'patologia-chip';
        chip.textContent = p;
        cont.appendChild(chip);
      });

      renderSugerencias();
      mensajeBienvenida();
      irA('p-principal');
      renderInstallBanner();
    })
    .catch(function(){
      document.getElementById('error-texto').textContent = 'Error de conexión — intenta de nuevo.';
      irA('p-error');
    });
}

function renderSugerencias() {
  var opciones = esVip
    ? ['¿Cómo voy con mi protocolo?', 'Invitar a un amigo', 'Agendar mi próxima cita']
    : ['¿Cómo voy con mi protocolo?', 'Tengo una duda sobre mi tratamiento', 'Agendar mi próxima cita'];
  var cont = document.getElementById('sugerencias-chips');
  cont.innerHTML = '';
  opciones.forEach(function(op){
    var chip = document.createElement('div');
    chip.className = 'sugerencia-chip';
    chip.textContent = op;
    chip.onclick = function(){ document.getElementById('chat-input').value = op; enviarMensaje(); };
    cont.appendChild(chip);
  });
}

function agregarMensaje(texto, tipo) {
  var cont = document.getElementById('chat-mensajes');
  var div = document.createElement('div');
  div.className = 'msg ' + (tipo === 'user' ? 'msg-user' : 'msg-nova');
  div.textContent = texto;
  cont.appendChild(div);
  cont.scrollTop = cont.scrollHeight;
  return div;
}

function mensajeBienvenida() {
  var nombre = (pacienteRecord.fields['Nombre completo'] || '').split(' ')[0];
  agregarMensaje('Hola ' + nombre + ', soy NOVA. ¿En qué te puedo apoyar hoy?', 'nova');
}

var novaHistorial = [];

function enviarMensaje() {
  var input = document.getElementById('chat-input');
  var texto = input.value.trim();
  if (!texto) return;
  agregarMensaje(texto, 'user');
  novaHistorial.push({ role: 'user', content: texto });
  input.value = '';

  var btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  var loadingDiv = agregarMensaje('NOVA está escribiendo…', 'nova');
  loadingDiv.classList.add('msg-loading');

  var controller = new AbortController();
  var timeoutId = setTimeout(function(){ controller.abort(); }, 30000);

  fetch('/api/nova', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    signal: controller.signal,
    body: JSON.stringify({ pacienteCode: pacienteCodigo, messages: novaHistorial, max_tokens: 1024 }),
  })
    .then(function(r){ return r.json(); })
    .then(function(data){
      clearTimeout(timeoutId);
      loadingDiv.remove();
      if (data.error) { agregarMensaje('⚠️ ' + data.error, 'nova'); return; }
      var bloqueTexto = Array.isArray(data.content)
        ? data.content.find(function(b){ return b && b.type === 'text' && typeof b.text === 'string' && b.text.trim().length > 0; })
        : null;
      if (!bloqueTexto) { agregarMensaje('⚠️ NOVA no generó una respuesta legible. Intenta de nuevo.', 'nova'); return; }
      agregarMensaje(bloqueTexto.text, 'nova');
      novaHistorial.push({ role: 'assistant', content: bloqueTexto.text });
    })
    .catch(function(err){
      clearTimeout(timeoutId);
      loadingDiv.remove();
      if (err.name === 'AbortError') agregarMensaje('La respuesta tardó demasiado. Intenta de nuevo.', 'nova');
      else agregarMensaje('Error de conexión. Intenta de nuevo.', 'nova');
    })
    .finally(function(){ btn.disabled = false; });
}

document.getElementById('chat-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') enviarMensaje();
});

// ─── SUBIR ESTUDIO CON VERIFICACIÓN DE IDENTIDAD ─────────────────
document.getElementById('btn-subir-estudio').addEventListener('click', function() {
  document.getElementById('input-estudio').click();
});

document.getElementById('input-estudio').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;

  var estadoEl = document.getElementById('estudio-estado');
  var nombreEl = document.getElementById('estudio-nombre');
  var btn = document.getElementById('btn-subir-estudio');

  var tiposValidos = ['application/pdf', 'image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/heic'];
  if (tiposValidos.indexOf(file.type) === -1) {
    estadoEl.style.color = '#E2574B';
    estadoEl.textContent = 'Formato no válido — usa PDF o foto (JPG/PNG).';
    return;
  }
  if (file.size > 15 * 1024 * 1024) {
    estadoEl.style.color = '#E2574B';
    estadoEl.textContent = 'El archivo es muy grande (máximo 15MB).';
    return;
  }

  nombreEl.textContent = file.name;
  estadoEl.style.color = 'var(--text-2)';
  estadoEl.textContent = 'Verificando identidad…';
  btn.disabled = true;

  var reader = new FileReader();
  reader.onload = function() {
    var base64 = reader.result.split(',')[1];
    fetch('/api/nova', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'paciente_subir_estudio',
        pacienteCode: pacienteCodigo,
        fileBase64: base64,
        fileName: file.name,
        mediaType: file.type,
      }),
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        btn.disabled = false;
        if (data.ok && data.verificado) {
          estadoEl.style.color = '#5FAE6E';
          estadoEl.textContent = 'Estudio agregado a tu expediente ✓';
          document.getElementById('input-estudio').value = '';
        } else {
          estadoEl.style.color = '#E2574B';
          estadoEl.textContent = data.error || 'No se pudo verificar el documento.';
        }
      })
      .catch(function() {
        btn.disabled = false;
        estadoEl.style.color = '#E2574B';
        estadoEl.textContent = 'Error de conexión. Intenta de nuevo.';
      });
  };
  reader.readAsDataURL(file);
});

init();
</script>
</body>
</html>
