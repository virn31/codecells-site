<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Células madre y biológicos — Dosis, vías y criterio clínico (GENESIS™)</title>
<style>
  :root {
    --navy: #081327; --navy-800: #0f2444; --surface: #14294c;
    --teal: #12968a; --teal-light: #4fd1c0; --danger: #e0665f;
    --gold: #c8a050; --gold-light: #e0c185;
    --text: #eef2f6; --text-secondary: #a7b4c9; --radius: 14px;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--navy); color:var(--text); display:flex; justify-content:center; padding:32px 16px; }
  .wrap { width:100%; max-width:660px; }
  .dots { display:flex; gap:8px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--surface); transition:background .3s; }
  .dot.active { background:var(--teal-light); }
  .stage { position:relative; min-height:460px; max-height:640px; overflow-y:auto; background:var(--navy-800); border-radius:20px; padding:30px 28px; }
  .cell { opacity:0; transform:translateX(20px); transition:opacity .35s ease, transform .35s ease; }
  .cell.active { opacity:1; transform:translateX(0); }
  .icon-badge { width:56px; height:56px; border-radius:50%; background:rgba(79,209,192,0.12); display:flex; align-items:center; justify-content:center; margin-bottom:18px; font-size:26px; }
  h3 { margin:0 0 12px; font-size:20px; font-weight:600; color:#fff; }
  h4 { margin:18px 0 6px; font-size:14px; font-weight:700; color:var(--gold-light); letter-spacing:0.02em; }
  p { font-size:14.5px; line-height:1.7; color:var(--text-secondary); margin:0 0 12px; }
  .card { background:var(--surface); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; }
  .card p { margin:0; }
  .protocard { background:var(--surface); border-left:3px solid var(--teal-light); border-radius:8px; padding:10px 14px; margin-bottom:8px; }
  .protocard .pname { font-weight:700; color:#fff; font-size:13.5px; margin-bottom:4px; }
  .protocard .pcomp { font-size:12.5px; color:var(--text-secondary); margin-bottom:4px; }
  .protocard .pmeta { font-size:11px; color:var(--teal-light); font-family:monospace; margin-bottom:4px; }
  .protocard .pwarn { font-size:11.5px; color:var(--danger); }
  .opt { display:block; width:100%; text-align:left; background:var(--surface); color:var(--text); border:1.5px solid transparent; border-radius:10px; padding:11px 14px; font-size:13.5px; margin-bottom:8px; cursor:pointer; }
  .opt:hover { border-color:var(--teal); }
  .opt.correct { border-color:var(--teal-light); color:var(--teal-light); }
  .opt.wrong { border-color:var(--danger); color:var(--danger); }
  .feedback { font-size:13px; margin:8px 0 0; }
  .feedback.ok { color:var(--teal-light); }
  .feedback.bad { color:var(--danger); }
  .nav { display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
  button.navbtn { background:var(--teal); color:#04211d; border:none; border-radius:10px; padding:10px 18px; font-size:13.5px; font-weight:600; cursor:pointer; }
  button.navbtn.secondary { background:transparent; color:var(--text-secondary); border:1px solid var(--surface); }
  button.navbtn:disabled { opacity:0.3; cursor:default; }
  .label { font-size:11.5px; color:var(--text-secondary); letter-spacing:0.04em; text-transform:uppercase; }
  button.retry { background:transparent; border:1px solid var(--teal); color:var(--teal-light); border-radius:8px; padding:7px 14px; font-size:12.5px; margin-top:8px; cursor:pointer; }
  .subcounter { font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .rationale { border-left:2px solid var(--teal); padding-left:12px; margin-top:10px; }
  .nova-btn {
    position: fixed; bottom: 22px; right: 22px; z-index: 999;
    display: flex; align-items: center; gap: 8px;
    background: var(--teal); color: #04211d; text-decoration: none;
    font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700; font-size: 13px;
    padding: 12px 18px; border-radius: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    transition: transform .15s ease;
  }
  .nova-btn:hover { transform: translateY(-2px); }
  @media (max-width: 480px) {
    .nova-btn { bottom: 14px; right: 14px; padding: 10px 14px; font-size: 12px; }
  }
</style>
</head>
<body>
<a href="/portal-medico.html?nova=1" target="_blank" rel="noopener" class="nova-btn">💬 Preguntar a NOVA</a>
<div class="wrap">
  <div class="dots" id="dots"></div>
  <div class="stage" id="stage"></div>
  <div class="nav">
    <button class="navbtn secondary" id="backBtn">← Anterior</button>

<script>
var PRACTICE_CASES = [
  { caseText: "Paciente con artrosis de rodilla, candidato a MSC placentarias por vía intraarticular.",
    opts: ["10 millones de células, repitiendo cada 4-6 meses.", "1 millón de células por kg de peso, como en el esquema sistémico.", "28 millones de células, la dosis reservada para casos agudos."], correct: 0,
    rationale: "La artrosis por vía intraarticular usa 10 millones de células cada 4-6 meses — una dosis y frecuencia distinta tanto del esquema sistémico (1M/kg) como del esquema de mayor severidad (28M) reservado para casos como fractura aguda." },
  { caseText: "Paciente con fractura aguda, candidato a MSC placentarias con el esquema de mayor severidad.",
    opts: ["10 millones intraarticulares únicamente, igual que en artrosis.", "28 millones por vía intralesional, combinando simultáneamente la vía intravenosa — la única indicación donde se combinan ambas vías.", "1 millón por kg exclusivamente por vía IV, sin componente local."], correct: 1,
    rationale: "La fractura aguda es la única indicación documentada donde se combinan intralesional (28 millones) e intravenoso de forma simultánea — un esquema de mayor severidad que el usado en artrosis." },
  { caseText: "Paciente con VIH activo, candidato a exosomas.",
    opts: ["1 aplicación mensual durante 6 meses.", "1 aplicación cada 6 meses, igual que un paciente estable.", "Una sola aplicación de por vida."], correct: 0,
    rationale: "El VIH activo (enfermedad con actividad viral) requiere una frecuencia mucho más intensiva: 1 aplicación mensual durante 6 meses — muy distinto del esquema para un paciente VIH+ estable." },
  { caseText: "Paciente VIH+ clínicamente estable e indetectable (sin actividad de la enfermedad), candidato a exosomas.",
    opts: ["1 aplicación mensual durante 6 meses, igual que en VIH activo.", "1 aplicación cada 6 meses.", "No es candidato a exosomas bajo ninguna circunstancia."], correct: 1,
    rationale: "Un paciente VIH+ estable e indetectable, sin actividad de la enfermedad, se maneja con una frecuencia mucho más espaciada (cada 6 meses) — tratarlo igual que un caso de VIH activo sería sobretratamiento." },
  { caseText: "Paciente con DM2 controlada, candidato a implante placentario (presentación de 1-2g, vía subcutánea con técnica específica).",
    opts: ["Cada 6 meses.", "Cada 2 meses, igual que un caso descompensado.", "Una sola vez al año sin excepción, sin importar el control metabólico."], correct: 0,
    rationale: "La DM2 controlada corresponde al esquema de cada 6 meses — el implante placentario es de regeneración más lenta, orientado a enfermedad crónico-degenerativa estable, no a descompensación aguda." },
  { caseText: "Paciente con DM2 descompensada, candidato a implante placentario.",
    opts: ["Cada 6 meses, igual que en control metabólico estable.", "Cada 2 meses — la frecuencia se acorta ante descompensación.", "Se suspende el implante placentario hasta compensar completamente al paciente."], correct: 1,
    rationale: "Ante descompensación metabólica, la frecuencia del implante placentario se acorta a cada 2 meses — un ejemplo claro de que la frecuencia depende del estado de control, no es fija para la indicación." },
  { caseText: "Paciente oncológico, candidato a células NK.",
    opts: ["Monodosis estándar por vía IV, cada 2 meses — exclusivo de pacientes oncológicos.", "Dosis ajustada por kg de peso, igual que MSC.", "Dosis ajustada por severidad en viales, igual que exosomas."], correct: 0,
    rationale: "Las células NK se manejan con monodosis estándar (no por peso ni por severidad en viales), vía IV, cada 2 meses, y son exclusivas de pacientes con cáncer — su mecanismo de inmunovigilancia y control tumoral no aplica a otras indicaciones del catálogo de biológicos." }
];

var DIFFERENTIAL_CASES = [
  { caseText: "Un médico ve a dos pacientes VIH+ candidatos a exosomas y asume que ambos deben recibir la misma frecuencia de aplicación, ya que comparten el mismo diagnóstico de base. Paciente A: VIH activo. Paciente B: VIH+ estable e indetectable.",
    opts: ["Correcto, el mismo diagnóstico de base implica la misma frecuencia de aplicación.", "Incorrecto: la actividad de la enfermedad, no solo el diagnóstico, determina la frecuencia — VIH activo requiere 1 aplicación mensual x 6 meses; VIH+ estable requiere solo cada 6 meses. Tratarlos igual sería sobretratar al paciente estable o subtratar al activo."], correct: 1,
    rationale: "El mismo diagnóstico de base (VIH) puede requerir esquemas completamente distintos según la actividad de la enfermedad — es un error de razonamiento común asumir que 'mismo diagnóstico' equivale a 'mismo protocolo'." },
  { caseText: "Un médico aplica MSC placentarias a un paciente con fractura aguda usando el mismo esquema que usaría en un paciente con artrosis (10 millones intraarticulares cada 4-6 meses), asumiendo que 'ambos son MSC, así que la dosis es la misma'.",
    opts: ["Correcto, la dosis de MSC es estándar sin importar la indicación.", "Incorrecto: la artrosis usa 10 millones intraarticulares cada 4-6 meses; la fractura aguda usa 28 millones intralesional combinados con IV simultáneo — la severidad y la urgencia del caso determinan tanto la dosis como si se combinan vías, no el solo hecho de tratarse de MSC."], correct: 1,
    rationale: "MSC placentarias no tiene una dosis única — varía según indicación, severidad y vía, desde 10 millones en un caso crónico hasta 28 millones combinados con IV en un caso agudo. Asumir una dosis fija por producto ignora el criterio clínico real." },
  { caseText: "Un médico asume que, como el implante placentario ya se aplicó hace 6 meses según el esquema de DM2 controlada, no hay razón para reevaluar la frecuencia aunque el paciente se haya descompensado metabólicamente en el intervalo.",
    opts: ["Correcto, la frecuencia programada se mantiene sin importar cambios en el estado del paciente.", "Incorrecto: la frecuencia del implante placentario depende del estado de control metabólico actual, no de un calendario fijo — ante descompensación, la frecuencia debe acortarse a cada 2 meses, revalorando al paciente en cada visita."], correct: 1,
    rationale: "Tratar la frecuencia de aplicación como un calendario fijo, sin reevaluar el estado clínico actual del paciente, ignora que el criterio real es el grado de control metabólico en el momento de cada decisión, no en el momento de la aplicación anterior." }
];

var QUESTIONS = [
  { q: "¿Cuál es la dosis estándar sistémica de MSC placentarias?", opts: ["1 millón de células por kg de peso del paciente", "10 millones de células fijas, sin importar el peso", "28 millones de células en todos los casos", "500 mil células por kg de peso"], correct: 0 },
  { q: "¿Qué rango de dosis se usa para MSC placentarias por vía intralesional/intraarticular?", opts: ["1-5 millones", "10-28 millones, según severidad", "50-100 millones en todos los casos", "No se usan estas vías para MSC"], correct: 1 },
  { q: "¿Cada cuánto se aplican MSC intraarticulares en un caso de artrosis?", opts: ["Cada 2 semanas", "Cada 4-6 meses", "Una sola vez de por vida", "Cada 2 meses"], correct: 1 },
  { q: "¿Qué dosis y combinación de vías corresponde a una fractura aguda tratada con MSC?", opts: ["10 millones intraarticulares únicamente", "28 millones intralesional, combinado simultáneamente con vía IV", "1 millón por kg, solo por vía oral", "Ninguna, las MSC no se indican en fracturas agudas"], correct: 1 },
  { q: "¿Cuál es la única indicación donde se combinan la vía intralesional e intravenosa de forma simultánea?", opts: ["Artrosis", "Fractura aguda", "VIH activo", "DM2 descompensada"], correct: 1 },
  { q: "¿Qué criterio de dosis y vía sigue MUSE Cells?", opts: ["El mismo criterio que las MSC placentarias", "Monodosis estándar, igual que las NK", "Dosis fija de 5 millones en todos los casos", "Solo se aplica por vía oral"], correct: 0 },
  { q: "¿Cómo se determina la cantidad de exosomas a aplicar por sesión?", opts: ["Por kilogramo de peso del paciente, igual que MSC", "Por número de viales, según la severidad del caso", "Es siempre una monodosis fija", "Se calcula por superficie corporal"], correct: 1 },
  { q: "¿Qué vías de aplicación son posibles para los exosomas?", opts: ["Únicamente intravenosa", "IM, IV, SC, intralesional e intraarticular", "Únicamente oral", "Únicamente intraarticular"], correct: 1 },
  { q: "¿Con qué frecuencia se aplican exosomas en un paciente con VIH activo?", opts: ["Una vez al mes durante 6 meses", "Una vez cada 6 meses", "Una sola aplicación de por vida", "Cada 2 semanas de forma indefinida"], correct: 0 },
  { q: "¿Con qué frecuencia se aplican exosomas en un paciente VIH+ clínicamente estable e indetectable?", opts: ["Una vez al mes durante 6 meses", "Cada 6 meses", "Cada 2 meses", "No se indican exosomas en este perfil"], correct: 1 },
  { q: "¿Qué mecanismo permite a los exosomas actuar como mensajeros entre células?", opts: ["Transportan proteínas, lípidos y ácidos nucleicos de una célula donante a una receptora, cambiando su comportamiento", "Se dividen directamente para formar nuevo tejido", "Actúan exclusivamente como antiinflamatorios tópicos", "No tienen actividad de señalización celular"], correct: 0 },
  { q: "¿Qué tipo celular activan los exosomas durante la cicatrización, estimulando colágeno y elastina?", opts: ["Fibroblastos", "Hepatocitos", "Osteoclastos", "Adipocitos"], correct: 0 },
  { q: "¿Qué rol cumplen los exosomas en la respuesta inmunitaria?", opts: ["Transportan moléculas que contribuyen o suprimen la inflamación, ayudando a regular la respuesta inmune", "No tienen ninguna relación con el sistema inmune", "Bloquean por completo cualquier respuesta inflamatoria", "Solo actúan sobre el sistema nervioso"], correct: 0 },
  { q: "¿En qué contexto clínico se combinan exosomas con MSC o MUSE?", opts: ["Procesos específicos de reparación osteoarticular: regeneración de cartílago, tendinopatías, inflamación articular", "Nunca se combinan entre sí", "Únicamente en protocolos oncológicos", "Solo en pacientes pediátricos"], correct: 0 },
  { q: "¿Cuál es la vía de aplicación del implante placentario?", opts: ["Intravenosa exclusivamente", "Subcutánea, con técnica específica", "Oral", "Intramuscular en glúteo"], correct: 1 },
  { q: "¿En qué presentaciones viene el implante placentario?", opts: ["1 g y 2 g", "100 mg y 200 mg", "Solo en presentación líquida de 50 ml", "10 g y 20 g"], correct: 0 },
  { q: "¿Cada cuánto se aplica el implante placentario en un paciente con DM2 controlada?", opts: ["Cada 2 meses", "Cada 6 meses", "Una sola vez de por vida", "Cada 2 semanas"], correct: 1 },
  { q: "¿Cada cuánto se aplica el implante placentario en un paciente con DM2 descompensada?", opts: ["Cada 6 meses, igual que en control estable", "Cada 2 meses", "Se suspende hasta compensar por completo", "Cada 12 meses"], correct: 1 },
  { q: "¿Qué distingue al implante placentario frente a MSC o exosomas en cuanto a velocidad de acción?", opts: ["Es de regeneración más lenta, orientado a enfermedad crónico-degenerativa", "Actúa más rápido que cualquier otro biológico del catálogo", "No tiene relación con procesos regenerativos", "Solo se usa en procesos agudos"], correct: 0 },
  { q: "¿Cuál es la vía, dosis y población de uso de las células NK?", opts: ["Vía IV, monodosis estándar, cada 2 meses, exclusivo de pacientes oncológicos", "Vía oral, dosis por kg de peso, cualquier paciente", "Vía subcutánea, dosis por severidad, exclusivo VIH", "Intraarticular, monodosis, exclusivo artrosis"], correct: 0 }
];

var CELLS = [
  { label: "1 · Bienvenida", render: function() {
    return '<div class="icon-badge">🧬</div><h3>Células madre y biológicos — GENESIS™</h3>' +
      '<p>MSC placentarias, MUSE, Exosomas, Implante placentario y Células NK no comparten una sola lógica de dosis: cada uno se ajusta por peso, por severidad, o es monodosis fija, según el producto y la indicación. Este módulo asegura que domines esas diferencias.</p>' +
      '<div class="card"><p style="font-weight:600;color:#fff;margin-bottom:4px;">Objetivo de este módulo</p>' +
      '<p style="margin:0;">Podrás calcular o identificar la dosis correcta de cada biológico según indicación y severidad, seleccionar la vía de aplicación adecuada, y ajustar la frecuencia según el estado clínico actual del paciente, no según un calendario fijo.</p></div>';
  }},
  { label: "2 · Contexto", render: function() {
    return '<div class="icon-badge">💡</div><h3>¿Por qué importa esto?</h3>' +
      '<p>Cada uno de estos cinco biológicos tiene una lógica de dosificación distinta — confundirlas entre sí (aplicar dosis de MSC a exosomas, o tratar la frecuencia como un calendario fijo en vez de una reevaluación clínica) es un error real de manejo.</p>' +
      '<div class="card"><p style="font-weight:600;color:#fff;margin-bottom:4px;">Error frecuente</p>' +
      '<p style="margin:0;">Asumir que "mismo producto" o "mismo diagnóstico de base" implica la misma dosis, vía o frecuencia — cuando en realidad la severidad, la actividad de la enfermedad y el objetivo clínico son los que determinan cada uno de esos parámetros.</p></div>';
  }},
  { label: "3 · Concepto", render: function() {
    return '<div class="icon-badge">📚</div><h3>Los cinco biológicos, dosis por dosis</h3>' +
      '<div class="protocard"><div class="pname">MSC placentarias</div><div class="pcomp">Sistémico: 1 millón de células por kg de peso. Intralesional/intraarticular: 10-28 millones según severidad.</div><div class="pmeta">Artrosis: 10M intraarticular c/4-6 meses · Fractura aguda: 28M intralesional + IV simultáneo</div><div class="pwarn">Única indicación con combinación de vías: fractura aguda</div></div>' +
      '<div class="protocard"><div class="pname">MUSE Cells</div><div class="pcomp">Mismo criterio de dosis y vía que MSC placentarias (1M/kg sistémico, o 10-28M según severidad por vía local)</div></div>' +
      '<div class="protocard"><div class="pname">Exosomas</div><div class="pcomp">Dosis por número de viales, según severidad del caso — no por peso corporal. Vías: IM, IV, SC, intralesional, intraarticular. Pueden combinarse con MSC/MUSE en reparación osteoarticular (cartílago, tendinopatías, inflamación articular).</div><div class="pmeta">VIH activo: 1×mes × 6 meses · VIH+ estable/indetectable: cada 6 meses</div></div>' +
      '<div class="protocard"><div class="pname">Implante placentario</div><div class="pcomp">Presentación de 1g o 2g, ajustada según severidad. Vía subcutánea con técnica específica. Regeneración más lenta, orientado a enfermedad crónico-degenerativa.</div><div class="pmeta">DM2 controlada: cada 6 meses · DM2 descompensada: cada 2 meses</div></div>' +
      '<div class="protocard"><div class="pname">Células NK</div><div class="pcomp">Monodosis estándar (no varía por peso ni severidad). Vía IV.</div><div class="pmeta">Cada 2 meses · Exclusivo pacientes oncológicos</div><div class="pwarn">Inmunovigilancia viral/bacteriana + control tumoral — no aplica a otras indicaciones del catálogo</div></div>' +
      '<h4>Mecanismo de los exosomas</h4>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Comunicación intercelular:</strong> transportan proteínas, lípidos y ácidos nucleicos de una célula donante a una receptora, cambiando su comportamiento. <strong style="color:#fff;">Regeneración:</strong> activan fibroblastos, estimulando colágeno y elastina en la cicatrización. <strong style="color:#fff;">Inmunológico:</strong> transportan moléculas pro y antiinflamatorias, regulando la respuesta inmune.</p></div>';
  }},
  { label: "4 · Ejemplo guiado", render: function() {
    return '<div class="icon-badge">🩺</div><h3>Ejemplo guiado</h3>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Caso:</strong> Paciente con fractura aguda, candidato a MSC placentarias.</p></div>' +
      '<p><strong style="color:#fff;">Paso 1 — reconocer la severidad/urgencia del caso.</strong> Una fractura aguda no se maneja con el esquema de un caso crónico (como artrosis, 10M intraarticular).</p>' +
      '<p><strong style="color:#fff;">Paso 2 — aplicar el esquema correcto de mayor severidad.</strong> Se usan 28 millones de células por vía intralesional.</p>' +
      '<p><strong style="color:#fff;">Paso 3 — reconocer la única indicación de vías combinadas.</strong> A diferencia de cualquier otro caso del catálogo, la fractura aguda combina simultáneamente la vía intralesional con la intravenosa.</p>' +
      '<p style="margin:0;"><strong style="color:#fff;">Conclusión:</strong> el mismo producto (MSC placentarias) puede requerir dosis, vía y combinación de vías completamente distintas según la severidad y urgencia del caso — no existe "la dosis de MSC", existen dosis de MSC según indicación.</p>';
  }},
  { label: "5 · Práctica", render: function(st) {
    var idx = st.practiceIndex || 0; var c = PRACTICE_CASES[idx]; var answered = st.practiceAnswers[idx];
    var html = '<div class="icon-badge">✏️</div><h3>Práctica clínica</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + PRACTICE_CASES.length + '</p><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickPractice('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<PRACTICE_CASES.length-1) html += '<button class="retry" onclick="nextPracticeCase()">Siguiente caso →</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste los casos de práctica. Continúa al diagnóstico diferencial.</p>'; }
    return html;
  }},
  { label: "6 · Diagnóstico diferencial", render: function(st) {
    var idx = st.diffIndex || 0; var c = DIFFERENTIAL_CASES[idx]; var answered = st.diffAnswers[idx];
    var html = '<div class="icon-badge">🔍</div><h3>Cuando dos esquemas compiten</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + DIFFERENTIAL_CASES.length + '</p><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickDiff('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<DIFFERENTIAL_CASES.length-1) html += '<button class="retry" onclick="nextDiffCase()">Siguiente caso →</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste el diagnóstico diferencial.</p>'; }
    return html;
  }},
  { label: "7 · Evaluación", render: function(st) {
    var idx = st.quizIndex || 0;
    if (idx >= QUESTIONS.length) {
      var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
      var pct = Math.round((correct/QUESTIONS.length)*100); var passed = pct>=80;
      return '<div class="icon-badge">✅</div><h3>Resultado de la evaluación</h3><div class="card"><p style="font-size:32px;font-weight:700;margin:0 0 6px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">'+pct+'%</p><p style="margin:0;">'+correct+' de '+QUESTIONS.length+' correctas — '+(passed?"Aprobado (mínimo 80%)":"No aprobado, se requiere 80% o más")+'</p></div>' + (passed?"":'<button class="retry" onclick="restartQuiz()">Reintentar evaluación completa</button>');
    }
    var qu = QUESTIONS[idx]; var answered = st.quizAnswers[idx];
    var html = '<div class="icon-badge">✅</div><h3>Evaluación</h3><p class="subcounter">Reactivo ' + (idx+1) + ' de ' + QUESTIONS.length + '</p><div class="card"><p style="margin:0;font-weight:600;color:#fff;">' + qu.q + '</p></div>';
    qu.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===qu.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickQuiz('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===qu.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"Incorrecto — la respuesta correcta está marcada.")+'</p><button class="retry" onclick="nextQuizQuestion()">'+(idx===QUESTIONS.length-1?"Ver resultado":"Siguiente reactivo →")+'</button>'; }
    return html;
  }},
  { label: "8 · Resumen", render: function(st) {
    var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
    var pct = Math.round((correct/QUESTIONS.length)*100) || 0; var passed = pct>=80;
    return '<div class="icon-badge">🏁</div><h3>Resumen y siguiente paso</h3>' +
      '<ul style="padding-left:18px;font-size:13.5px;color:var(--text-secondary);line-height:1.8;margin-bottom:1rem;">' +
      '<li>MSC y MUSE se dosifican por peso (1M/kg) o por severidad en vía local (10-28M) — la fractura aguda es la única indicación con vías combinadas.</li>' +
      '<li>Exosomas e implante placentario se dosifican por severidad, no por peso; NK es monodosis estándar fija.</li>' +
      '<li>La frecuencia no es un calendario fijo: depende de la actividad de la enfermedad (VIH activo vs. estable) o del estado de control (DM2 controlada vs. descompensada), y debe reevaluarse en cada visita.</li>' +
      '</ul>' +
      '<div class="card"><p style="font-weight:600;margin:0 0 4px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">Tu resultado: '+pct+'% — '+(passed?"módulo aprobado":"no aprobado, regresa a la celda 7 para reintentar")+'</p>' +
      '<p style="margin:8px 0 0;">Siguiente módulo sugerido: Farmacia e inyectables.</p></div>';
  }}
];

var state = { current: 0, practiceIndex: 0, practiceAnswers: {}, diffIndex: 0, diffAnswers: {}, quizIndex: 0, quizAnswers: {} };
function renderDots(){ var dots=document.getElementById("dots"); dots.innerHTML=""; CELLS.forEach(function(c,i){ var d=document.createElement("div"); d.className="dot"+(i===state.current?" active":""); dots.appendChild(d); }); }
function renderStage(){
  var stage=document.getElementById("stage");
  stage.innerHTML='<div class="cell active">'+CELLS[state.current].render(state)+'</div>';
  document.getElementById("cellLabel").textContent=CELLS[state.current].label;
  document.getElementById("backBtn").disabled=state.current===0;
  var nextBtn=document.getElementById("nextBtn"); var blocked=false;
  if(state.current===4) blocked=!(state.practiceIndex===PRACTICE_CASES.length-1 && state.practiceAnswers[PRACTICE_CASES.length-1]!==undefined);
  else if(state.current===5) blocked=!(state.diffIndex===DIFFERENTIAL_CASES.length-1 && state.diffAnswers[DIFFERENTIAL_CASES.length-1]!==undefined);
  else if(state.current===6) blocked=state.quizIndex<QUESTIONS.length;
  nextBtn.disabled=blocked;
  nextBtn.textContent = state.current===CELLS.length-1 ? "Reiniciar módulo" : (blocked?"Completa los casos para continuar":"Siguiente →");
  renderDots();
}
function pickPractice(i){ var idx=state.practiceIndex; if(state.practiceAnswers[idx]!==undefined) return; state.practiceAnswers[idx]=i; renderStage(); }
function nextPracticeCase(){ state.practiceIndex++; renderStage(); }
function pickDiff(i){ var idx=state.diffIndex; if(state.diffAnswers[idx]!==undefined) return; state.diffAnswers[idx]=i; renderStage(); }
function nextDiffCase(){ state.diffIndex++; renderStage(); }
function pickQuiz(i){ var idx=state.quizIndex; if(state.quizAnswers[idx]!==undefined) return; state.quizAnswers[idx]=i; renderStage(); }
function nextQuizQuestion(){ state.quizIndex++; renderStage(); }
function restartQuiz(){ state.quizIndex=0; state.quizAnswers={}; renderStage(); }
document.getElementById("backBtn").onclick=function(){ if(state.current>0){ state.current--; renderStage(); } };
document.getElementById("nextBtn").onclick=function(){ if(state.current<CELLS.length-1){ state.current++; renderStage(); } else { state={current:0,practiceIndex:0,practiceAnswers:{},diffIndex:0,diffAnswers:{},quizIndex:0,quizAnswers:{}}; renderStage(); } };
renderStage();
</script>
</body>
</html>
