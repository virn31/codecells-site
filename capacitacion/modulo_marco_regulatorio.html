<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Marco regulatorio mexicano — Módulo 3</title>
<style>
  :root {
    --navy: #081327; --navy-800: #0f2444; --surface: #14294c;
    --teal: #12968a; --teal-light: #4fd1c0; --danger: #e0665f;
    --gold: #c8a050; --gold-light: #e0c185; --purple: #b79ae0;
    --text: #eef2f6; --text-secondary: #a7b4c9; --radius: 14px;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--navy); color:var(--text); display:flex; justify-content:center; padding:32px 16px; }
  .wrap { width:100%; max-width:660px; }
  .dots { display:flex; gap:8px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--surface); transition:background .3s; }
  .dot.active { background:var(--teal-light); }
  .stage { position:relative; min-height:460px; max-height:640px; overflow-y:auto; background:var(--navy-800); border-radius:20px; padding:30px 28px; }
  .cell { opacity:0; transform:translateX(20px); transition:opacity .35s ease, transform .35s ease; }
  .cell.active { opacity:1; transform:translateX(0); }
  .icon-badge { width:56px; height:56px; border-radius:50%; background:rgba(79,209,192,0.12); display:flex; align-items:center; justify-content:center; margin-bottom:18px; font-size:26px; }
  h3 { margin:0 0 12px; font-size:20px; font-weight:600; color:#fff; }
  p { font-size:14.5px; line-height:1.7; color:var(--text-secondary); margin:0 0 12px; }
  .card { background:var(--surface); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; }
  .card p { margin:0; }
  .phase-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .phase-chip { background:var(--surface); border-radius:8px; padding:8px 10px; font-size:11.5px; text-align:center; flex:1; min-width:80px; }
  .phase-chip.humoral { border-bottom:3px solid var(--teal-light); }
  .phase-chip.celular { border-bottom:3px solid var(--danger); }
  .opt { display:block; width:100%; text-align:left; background:var(--surface); color:var(--text); border:1.5px solid transparent; border-radius:10px; padding:11px 14px; font-size:13.5px; margin-bottom:8px; cursor:pointer; }
  .opt:hover { border-color:var(--teal); }
  .opt.correct { border-color:var(--teal-light); color:var(--teal-light); }
  .opt.wrong { border-color:var(--danger); color:var(--danger); }
  .feedback { font-size:13px; margin:8px 0 0; }
  .feedback.ok { color:var(--teal-light); }
  .feedback.bad { color:var(--danger); }
  .nav { display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
  button.navbtn { background:var(--teal); color:#04211d; border:none; border-radius:10px; padding:10px 18px; font-size:13.5px; font-weight:600; cursor:pointer; }
  button.navbtn.secondary { background:transparent; color:var(--text-secondary); border:1px solid var(--surface); }
  button.navbtn:disabled { opacity:0.3; cursor:default; }
  .label { font-size:11.5px; color:var(--text-secondary); letter-spacing:0.04em; text-transform:uppercase; }
  button.retry { background:transparent; border:1px solid var(--teal); color:var(--teal-light); border-radius:8px; padding:7px 14px; font-size:12.5px; margin-top:8px; cursor:pointer; }
  .subcounter { font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .rationale { border-left:2px solid var(--teal); padding-left:12px; margin-top:10px; }

  /* etiquetas gobierno / interno / puente */
  .tag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
         padding:3px 9px; border-radius:20px; margin-bottom:10px; border:1px solid; }
  .tag-gob { color:var(--teal-light); border-color:rgba(79,209,192,0.5); background:rgba(79,209,192,0.08); }
  .tag-interno { color:var(--gold-light); border-color:rgba(200,160,80,0.5); background:rgba(200,160,80,0.08); }
  .tag-puente { color:var(--purple); border-color:rgba(183,154,224,0.5); background:rgba(183,154,224,0.08); }

  .two-col { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .colcard { flex:1; min-width:230px; background:var(--surface); border-radius:var(--radius); padding:14px 16px; }
  .colcard.gob { border-top:3px solid var(--teal-light); }
  .colcard.interno { border-top:3px solid var(--gold); }
  .colcard h4 { margin:0 0 8px; font-size:12.5px; letter-spacing:0.04em; text-transform:uppercase; }
  .colcard.gob h4 { color:var(--teal-light); }
  .colcard.interno h4 { color:var(--gold-light); }
  .colcard ul { margin:0; padding-left:16px; font-size:12.5px; color:var(--text-secondary); }
  .colcard li { margin-bottom:6px; }
  .colcard li b { color:var(--text); }
  .nova-btn {
    position: fixed; bottom: 22px; right: 22px; z-index: 999;
    display: flex; align-items: center; gap: 8px;
    background: var(--teal); color: #04211d; text-decoration: none;
    font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700; font-size: 13px;
    padding: 12px 18px; border-radius: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    transition: transform .15s ease;
  }
  .nova-btn:hover { transform: translateY(-2px); }
  @media (max-width: 480px) {
    .nova-btn { bottom: 14px; right: 14px; padding: 10px 14px; font-size: 12px; }
  }
</style>

var QUESTIONS = [
  { tag:"gob", q: "¿Qué instrumento establece el marco general del ejercicio de las profesiones médicas en México?", opts: ["Ley General de Salud (LGS)", "NOM-253-SSA1-2012", "Reglamento en Materia de Trasplantes", "El convenio con Regene Global"], correct: 0 },

            '<li><b>NOVA / CAPACITACIONES_MEDICO</b> — seguimiento administrativo.</li>' +
          '</ul></div>' +
        '</div>' +
        '<p>La licencia institucional de COFEPRIS sí es gubernamental — pero la manera en que CODE CELLS® organiza quién puede usarla día a día (niveles, flujos, plazos) es enteramente una decisión interna de la empresa.</p>' +
        '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Regla práctica:</strong> si puede cambiar en una junta de los tres socios sin tocar ninguna ley, es política interna. Si requiere modificar un trámite ante una autoridad federal, es marco gubernamental.</p></div>';
    }
  },
  {
    label: "4 · Ejemplo guiado",
    render: function() {
      return '<div class="icon-badge">🩺</div><h3>Ejemplo guiado</h3>' +
        '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Pregunta real de un médico:</strong> "Voy a aplicar exosomas RGCD042417 la próxima semana. ¿Necesito sacar mi propia licencia COFEPRIS antes de hacerlo?"</p></div>' +
        '<p><strong style="color:#fff;">Paso 1 — separar los dos planos.</strong> Hay una pregunta gubernamental real (¿existe requisito de licencia sanitaria?) y una pregunta interna (¿qué nivel de certificación necesito?). No son lo mismo.</p>' +
        '<p><strong style="color:#fff;">Paso 2 — resolver el plano gubernamental.</strong> El uso terapéutico de exosomas cae en el Reglamento en Materia de Trasplantes, que exige licencia sanitaria — pero del establecimiento, no de cada médico. Esa licencia ya la sostiene CODE CELLS® ante COFEPRIS.</p>' +
        '<p><strong style="color:#fff;">Paso 3 — resolver el plano interno.</strong> Lo que sí depende del médico es su nivel de certificación clínica. Si el protocolo es GENESIS™ (Avanzado) y su nivel actual no lo cubre, aplica el Flujo B: acceso inmediato + compromiso de capacitación en 7 días — una regla de CODE CELLS®, no de ninguna autoridad.</p>' +
        '<p style="margin:0;"><strong style="color:#fff;">Respuesta correcta:</strong> "No necesitas tramitar licencia COFEPRIS individual — eso ya está resuelto a nivel institucional. Lo que sí debes confirmar es tu nivel de certificación interna para ese protocolo específico."</p>';
    }
  },
  {
    label: "5 · Práctica",
    render: function(st) {
      var idx = st.practiceIndex || 0;
      var c = PRACTICE_CASES[idx];
      var answered = st.practiceAnswers[idx];
      var tagLabel = c.tag === "gob" ? "GOBIERNO" : (c.tag === "interno" ? "CODE CELLS® INTERNO" : "PUENTE");
      var html = '<div class="icon-badge">✏️</div><h3>Práctica — un caso por subtema</h3>' +
        '<p class="subcounter">Caso ' + (idx + 1) + ' de ' + PRACTICE_CASES.length + '</p>' +
        '<span class="tag tag-' + c.tag + '">' + tagLabel + '</span>' +
        '<div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
      c.opts.forEach(function(o, i) {
        var cls = "opt";
        if (answered !== undefined) {
          if (i === c.correct) cls += " correct";
          else if (i === answered) cls += " wrong";
        }
        html += '<button class="' + cls + '" onclick="pickPractice(' + i + ')">' + o + '</button>';
      });
      if (answered !== undefined) {
        var ok = answered === c.correct;
        html += '<p class="feedback ' + (ok ? "ok" : "bad") + '">' + (ok ? "Correcto." : "No es correcto.") + '</p>';
        html += '<p class="rationale">' + c.rationale + '</p>';
        if (idx < PRACTICE_CASES.length - 1) {
          html += '<button class="retry" onclick="nextPracticeCase()">Siguiente caso →</button>';
        } else {
          html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste los 7 casos. Continúa al diagnóstico diferencial.</p>';
        }
      }
      return html;
    }
  },
  {
    label: "6 · Diagnóstico diferencial",
    render: function(st) {
      var idx = st.diffIndex || 0;
      var c = DIFFERENTIAL_CASES[idx];
      var answered = st.diffAnswers[idx];
      var tagLabel = c.tag === "gob" ? "GOBIERNO" : (c.tag === "interno" ? "CODE CELLS® INTERNO" : "PUENTE");
      var html = '<div class="icon-badge">🔍</div><h3>Cuando dos conceptos compiten</h3>' +
        '<p class="subcounter">Caso ' + (idx + 1) + ' de ' + DIFFERENTIAL_CASES.length + '</p>' +
        '<span class="tag tag-' + c.tag + '">' + tagLabel + '</span>' +
        '<div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
      c.opts.forEach(function(o, i) {
        var cls = "opt";
        if (answered !== undefined) {
          if (i === c.correct) cls += " correct";
          else if (i === answered) cls += " wrong";
        }
        html += '<button class="' + cls + '" onclick="pickDiff(' + i + ')">' + o + '</button>';
      });
      if (answered !== undefined) {
        var ok = answered === c.correct;
        html += '<p class="feedback ' + (ok ? "ok" : "bad") + '">' + (ok ? "Correcto." : "No es correcto.") + '</p>';
        html += '<p class="rationale">' + c.rationale + '</p>';
        if (idx < DIFFERENTIAL_CASES.length - 1) {
          html += '<button class="retry" onclick="nextDiffCase()">Siguiente caso →</button>';
        } else {
          html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste los casos de diagnóstico diferencial.</p>';
        }
      }
      return html;
    }
  },
  {
    label: "7 · Evaluación",
    render: function(st) {
      var idx = st.quizIndex || 0;
      if (idx >= QUESTIONS.length) {
        var correct = 0;
        QUESTIONS.forEach(function(qu, qi) { if (st.quizAnswers[qi] === qu.correct) correct++; });
        var pct = Math.round((correct / QUESTIONS.length) * 100);
        var passed = pct >= 80;
        return '<div class="icon-badge">✅</div><h3>Resultado de la evaluación</h3>' +
          '<div class="card"><p style="font-size:32px;font-weight:700;margin:0 0 6px;color:' + (passed ? "var(--teal-light)" : "var(--danger)") + ';">' + pct + '%</p>' +
          '<p style="margin:0;">' + correct + ' de ' + QUESTIONS.length + ' correctas — ' + (passed ? "Aprobado (mínimo 80%)" : "No aprobado, se requiere 80% o más") + '</p></div>' +
          (passed ? "" : '<button class="retry" onclick="restartQuiz()">Reintentar evaluación completa</button>');
      }
      var qu = QUESTIONS[idx];
      var answered = st.quizAnswers[idx];
      var tagLabel = qu.tag === "gob" ? "GOBIERNO" : (qu.tag === "interno" ? "CODE CELLS® INTERNO" : "PUENTE");
      var html = '<div class="icon-badge">✅</div><h3>Evaluación</h3>' +
        '<p class="subcounter">Reactivo ' + (idx + 1) + ' de ' + QUESTIONS.length + '</p>' +
        '<span class="tag tag-' + qu.tag + '">' + tagLabel + '</span>' +
        '<div class="card"><p style="margin:0;font-weight:600;color:#fff;">' + qu.q + '</p></div>';
      qu.opts.forEach(function(o, i) {
        var cls = "opt";
        if (answered !== undefined) {
          if (i === qu.correct) cls += " correct";
          else if (i === answered) cls += " wrong";
        }
        html += '<button class="' + cls + '" onclick="pickQuiz(' + i + ')">' + o + '</button>';
      });
      if (answered !== undefined) {
        var ok = answered === qu.correct;
        html += '<p class="feedback ' + (ok ? "ok" : "bad") + '">' + (ok ? "Correcto." : "Incorrecto — la respuesta correcta está marcada.") + '</p>';
        html += '<button class="retry" onclick="nextQuizQuestion()">' + (idx === QUESTIONS.length - 1 ? "Ver resultado" : "Siguiente reactivo →") + '</button>';
      }
      return html;
    }
  },
  {
    label: "8 · Resumen",
    render: function(st) {
      var correct = 0;
      var byTag = { gob: {c:0,t:0}, interno: {c:0,t:0}, puente: {c:0,t:0} };
      QUESTIONS.forEach(function(qu, qi) {
        byTag[qu.tag].t++;
        if (st.quizAnswers[qi] === qu.correct) { correct++; byTag[qu.tag].c++; }
      });
      var pct = Math.round((correct / QUESTIONS.length) * 100) || 0;
      var passed = pct >= 80;
      return '<div class="icon-badge">🏁</div><h3>Resumen y siguiente paso</h3>' +
        '<ul style="padding-left:18px;font-size:13.5px;color:var(--text-secondary);line-height:1.8;margin-bottom:1rem;">' +
        '<li>El marco <b style="color:var(--teal-light);">gubernamental</b> (LGS, Reglamento de Trasplantes, NOM-253, COFEPRIS, CNTS, RVOE) no lo decide CODE CELLS® — se cumple, tal cual, como cualquier institución de salud en México.</li>' +
        '<li>La <b style="color:var(--gold-light);">política administrativa interna</b> (convenio con Regene Global, niveles clínicos, Flujo A/B, plazos, NOVA) sí la define CODE CELLS®, y puede ajustarse internamente sin tocar ninguna ley.</li>' +
        '<li>Los casos <b style="color:var(--purple);">puente</b> — como el RVOE frente a la certificación interna — son donde más se confunden ambos planos, y donde vale la pena detenerse a distinguir con cuidado.</li>' +
        '</ul>' +
        '<div class="card"><p style="font-weight:600;margin:0 0 4px;color:' + (passed ? "var(--teal-light)" : "var(--danger)") + ';">Tu resultado: ' + pct + '% — ' + (passed ? "módulo aprobado" : "no aprobado, regresa a la celda 7 para reintentar") + '</p>' +
        '<p style="margin:8px 0 0;font-size:12.5px;">Gobierno: ' + byTag.gob.c + '/' + byTag.gob.t + ' · CODE CELLS® interno: ' + byTag.interno.c + '/' + byTag.interno.t + ' · Puente: ' + byTag.puente.c + '/' + byTag.puente.t + '</p>' +
        '<p style="margin:8px 0 0;">Siguiente módulo sugerido: Portal Médico.</p></div>';
    }
  }
];

var state = { current: 0, practiceIndex: 0, practiceAnswers: {}, diffIndex: 0, diffAnswers: {}, quizIndex: 0, quizAnswers: {} };

function renderDots() {
  var dots = document.getElementById("dots");
  dots.innerHTML = "";
  CELLS.forEach(function(c, i) {
    var d = document.createElement("div");
    d.className = "dot" + (i === state.current ? " active" : "");
    dots.appendChild(d);
  });
}

function renderStage() {
  var stage = document.getElementById("stage");
  stage.innerHTML = '<div class="cell active">' + CELLS[state.current].render(state) + '</div>';
  document.getElementById("cellLabel").textContent = CELLS[state.current].label;
  document.getElementById("backBtn").disabled = state.current === 0;

  var nextBtn = document.getElementById("nextBtn");
  var blocked = false;
  if (state.current === 4) {
    blocked = !(state.practiceIndex === PRACTICE_CASES.length - 1 && state.practiceAnswers[PRACTICE_CASES.length - 1] !== undefined);
  } else if (state.current === 5) {
    blocked = !(state.diffIndex === DIFFERENTIAL_CASES.length - 1 && state.diffAnswers[DIFFERENTIAL_CASES.length - 1] !== undefined);
  } else if (state.current === 6) {
    blocked = state.quizIndex < QUESTIONS.length;
  }
  nextBtn.disabled = blocked;
  nextBtn.textContent = state.current === CELLS.length - 1 ? "Reiniciar módulo" : (blocked ? "Completa los casos para continuar" : "Siguiente →");
  renderDots();
}

function pickPractice(i) {
  var idx = state.practiceIndex;
  if (state.practiceAnswers[idx] !== undefined) return;
  state.practiceAnswers[idx] = i;
  renderStage();
}
function nextPracticeCase() { state.practiceIndex++; renderStage(); }

function pickDiff(i) {
  var idx = state.diffIndex;
  if (state.diffAnswers[idx] !== undefined) return;
  state.diffAnswers[idx] = i;
  renderStage();
}
function nextDiffCase() { state.diffIndex++; renderStage(); }

function pickQuiz(i) {
  var idx = state.quizIndex;
  if (state.quizAnswers[idx] !== undefined) return;
  state.quizAnswers[idx] = i;
  renderStage();
}
function nextQuizQuestion() { state.quizIndex++; renderStage(); }
function restartQuiz() { state.quizIndex = 0; state.quizAnswers = {}; renderStage(); }

document.getElementById("backBtn").onclick = function() {
  if (state.current > 0) { state.current--; renderStage(); }
};
document.getElementById("nextBtn").onclick = function() {
  if (state.current < CELLS.length - 1) { state.current++; renderStage(); }
  else { state = { current: 0, practiceIndex: 0, practiceAnswers: {}, diffIndex: 0, diffAnswers: {}, quizIndex: 0, quizAnswers: {} }; renderStage(); }
};

renderStage();
</script>
</body>
</html>
