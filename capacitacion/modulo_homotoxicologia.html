  { q: "¿Cómo deben tomarse los comprimidos Heel?", opts: ["Disolviéndolos lentamente en la boca, preferentemente bajo la lengua, sin masticar ni tragar", "Masticándolos completamente antes de tragar", "Disueltos únicamente en bebidas calientes", "Solo por vía rectal en supositorio"], correct: 0 },
  { q: "¿Qué concepto describe el desplazamiento de la enfermedad hacia fases más reversibles (humorales) durante el proceso de curación?", opts: ["Vicariación regresiva", "Fase de neoplasia", "Desdiferenciación celular", "Corte biológico irreversible"], correct: 0 }
];

var CELLS = [
  { label: "1 · Bienvenida", render: function() {
    return '<div class="icon-badge">🌿</div><h3>Homotoxicología — Fundamento y manejo clínico</h3>' +
      '<p>La homotoxicología no es "dar homeopáticos" — es un modelo médico completo, desarrollado por el Dr. Hans-Heinrich Reckeweg, sobre la enfermedad como reacción defensiva del organismo. Este módulo cubre su teoría y las reglas reales de prescripción del Compendio CHII.</p>' +
      '<div class="card"><p style="font-weight:600;color:#fff;margin-bottom:4px;">Objetivo de este módulo</p>' +
      '<p style="margin:0;">Podrás explicar el fundamento teórico de la homotoxicología, identificar los 6 grupos de medicamentos antihomotóxicos (A-F), elegir correctamente entre Injeel simple y forte, y aplicar las reglas de dosificación, vía y advertencias documentadas.</p></div>' +
      '<div class="card" style="border-left:3px solid var(--gold-light);"><p style="font-weight:600;color:#fff;margin-bottom:4px;">Lo que este módulo NO cubre — y dónde encontrarlo</p>' +
      '<p style="margin:0;">Este módulo te da el marco teórico y las reglas generales de prescripción — no el listado remedio-por-síntoma (qué antihomotóxico específico corresponde a cada motivo de consulta). Esa capa —el Índice Terapéutico y la Materia Médica completos del Compendio— está integrada en <strong style="color:#fff;">NOVA</strong>. Cuando tengas un paciente con un motivo de consulta específico, pregúntale a NOVA directamente (botón inferior derecho) y te dará el remedio indicado con su fundamento.</p></div>';
  }},
  { label: "2 · Contexto", render: function() {
    return '<div class="icon-badge">💡</div><h3>¿Por qué importa esto?</h3>' +
      '<p>Tratar todos los preparados antihomotóxicos como si fueran intercambiables —mismo criterio de dosis, misma vía, sin distinguir el grupo al que pertenecen— ignora una lógica de prescripción que Reckeweg construyó con reglas específicas por categoría.</p>' +
      '<div class="card"><p style="font-weight:600;color:#fff;margin-bottom:4px;">Error frecuente</p>' +
      '<p style="margin:0;">Confundir una reactivación temporal de síntomas (vicariación regresiva, favorable) con un empeoramiento real, o elegir Injeel simple/forte sin considerar si la enfermedad es aguda o crónica y la sensibilidad del paciente.</p></div>';
  }},
  { label: "3 · Concepto", render: function() {
    return '<div class="icon-badge">📚</div><h3>Fundamento teórico</h3>' +
      '<div class="fundcard"><div class="fname">Reckeweg y el origen de la homotoxicología</div><div class="ftext">Dr. Hans-Heinrich Gustav Dietrich Reckeweg (1905-1985), nacido en Herford, Westfalia. Estudió medicina 1924-1930 en Würzburg, Münster, Berlín y Bonn. Fundó el laboratorio Heel en 1936 (nombre de la frase "Herba Est Ex Luce"). Entre 1948-1949 desarrolló la doctrina de la homotoxicología; en 1955 publicó su obra central "Homotoxines and Homotoxicoses".</div></div>' +
      '<div class="fundcard"><div class="fname">Homotoxinas y enfermedad</div><div class="ftext">La enfermedad es la manifestación de las reacciones de defensa que el organismo activa para proteger su integridad ante la agresión de homotoxinas — tiene, por tanto, un significado biológico favorable. La inflamación y la fiebre no son siempre negativas: sirven para detoxicar y eliminar homotoxinas. La intervención terapéutica debe modular, no inhibir, estas reacciones defensivas.</div></div>' +
      '<div class="fundcard"><div class="fname">Vicariación regresiva y fases celulares</div><div class="ftext">Durante la curación, la enfermedad puede desplazarse (vicariación regresiva) hacia fases más reversibles y humorales; en sentido contrario, puede progresar hacia fases celulares (impregnación, degeneración, neoplasia/desdiferenciación) de mayor irreversibilidad. El sistema de la gran defensa (mesénquima) es la base biológica de este movimiento.</div></div>' +

      '<h4>Los 6 grupos de medicamentos antihomotóxicos (A-F)</h4>' +
      '<div class="protocard"><div class="pname">A · Medicamentos compuestos</div><div class="pcomp">Los de prescripción más frecuente. 4 subgrupos: <strong style="color:#fff;">Especialidades</strong> (dosis fija, una potencia, nombre de un vocablo: Engystol®, Lymphomyosot®, Trameel S®, Zeel T®), <strong style="color:#fff;">Homaccord</strong> (acordes de potencias, sufijo "Homaccord®", gotas y solución inyectable), <strong style="color:#fff;">Injeel mixtos</strong> (2+ componentes, solo solución inyectable, prefijo/sufijo "Injeel"), <strong style="color:#fff;">Compositum</strong> (mezclas más complejas, inyectable y/o gotas).</div></div>' +
      '<div class="protocard"><div class="pname">B · Homeopáticos simples o unitarios</div><div class="pcomp">Elección por ley de similitud (cuadro patogenético = cuadro clínico del paciente). Se presentan en acordes de potencias: Injeel e Injeel forte.</div></div>' +
      '<div class="protocard"><div class="pname">C · Alopáticos homeopatizados</div><div class="pcomp">Antibióticos y antipiréticos homeopatizados. Útiles en patología iatrogénica (multimorbilidad por medicación múltiple).</div></div>' +
      '<div class="protocard"><div class="pname">D · Catalizadores intermediarios</div><div class="pcomp">Actúan en la respiración celular y el ciclo del ácido cítrico. Reparan defectos en cadenas metabólicas bloqueadas — útiles en afecciones crónicas y degenerativas.</div></div>' +
      '<div class="protocard"><div class="pname">E · Nosodes</div><div class="pcomp">Obtenidos de tejidos/productos patológicos o microorganismos (sin riesgo infeccioso). Se eligen por similitud anamnésica-etiológica, tras superar la fase aguda de una infección previa.</div></div>' +
      '<div class="protocard"><div class="pname">F · Organopreparados-"suis"</div><div class="pcomp">De cerdos sanos. Acción regenerante/vitalizante a nivel celular — terapia de estimulación específica de un órgano, típicamente tras el tratamiento de base con el compuesto homeopático indicado.</div></div>' +

      '<h4>Elección de diluciones: Injeel simple vs. forte</h4>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Injeel simple</strong> (potencias altas): reactividad desconocida, o enfermedades crónicas — efectos más suaves, sin reacciones iniciales intensas. <strong style="color:#fff;">Injeel forte</strong> (potencias más bajas): enfermedades agudas en pacientes sin sensibilidad especial — se pasa a Injeel simple cuando la mejoría es manifiesta.</p></div>' +

      '<h4>Dosificación: aguda vs. crónica</h4>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Aguda grave:</strong> 1 comp./10 gotas cada 15 min, máx. 2h, reduciendo hasta 3-6 tomas/día; inyectables hasta 3x/día. <strong style="color:#fff;">Crónica/mantenimiento:</strong> oral 1 comp./10 gotas 3x/día; inyectable 1-3x/semana. Por grupo: homeopáticos clásicos 1-3x/semana (agudo 1-3x/día); alopáticos homeopatizados, catalizadores y organopreparados 1-2x/semana; nosodes 1-3x/semana.</p></div>' +

      '<h4>Vías de administración</h4>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">IV:</strong> más rápida, bajo control médico, mejores resultados en agudo — vigilar siempre por posible reacción alérgica. <strong style="color:#fff;">IM:</strong> más lenta pero efecto más duradero. <strong style="color:#fff;">SC:</strong> rápida en zonas dolorosas/puntos de acupuntura. <strong style="color:#fff;">ID:</strong> mesoterapia/homeosiniatría.</p></div>' +
      '<div class="card"><p style="margin:0;"><strong style="color:var(--danger);">Proinum®</strong> — única contraindicación formal de vía IV. <strong style="color:var(--danger);">Cymeheel®, Disheel®, Ubicheel®</strong> — evitar IV sin experiencia, riesgo de reacciones iniciales intensas.</p></div>' +

      '<h4>Advertencias generales</h4>' +
      '<div class="card"><p style="margin:0;">Gotas (mezcla hidroalcohólica): discreción en hepatópatas/ex alcohólicos. Comprimidos (lactosa): precaución en intolerancia; no contraindicados en diabetes (0.025 UP por comprimido de 300mg si se requiere control estricto). Administración sublingual: disolver lentamente, no masticar ni tragar.</p></div>' +

      '<h4>¿Qué remedio para qué motivo de consulta?</h4>' +
      '<div class="card" style="border-left:3px solid var(--gold-light);"><p style="margin:0;">Este módulo te da el marco (grupos A-F, diluciones, dosis, vías). La elección remedio-por-síntoma específico (ej. "¿qué compuesto para cervicobraquialgia?", "¿qué organopreparado para insuficiencia hepática funcional?") vive en el Índice Terapéutico y la Materia Médica del Compendio, integrados en <strong style="color:#fff;">NOVA</strong>. Pregúntale directamente ante cada motivo de consulta real.</p></div>';
  }},
  { label: "4 · Ejemplo guiado", render: function() {
    return '<div class="icon-badge">🩺</div><h3>Ejemplo guiado</h3>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Caso:</strong> Paciente nuevo, sin historial previo de tratamiento homeopático, presenta un cuadro crónico de años de evolución.</p></div>' +
      '<p><strong style="color:#fff;">Paso 1 — consultar a NOVA por el remedio específico.</strong> Antes de elegir grupo y dilución, se le pregunta a NOVA algo como: "Paciente con [motivo de consulta específico], ¿qué antihomotóxico compuesto corresponde según el Índice Terapéutico?" — NOVA responde con el remedio indicado y su fundamento en la Materia Médica.</p>' +
      '<p><strong style="color:#fff;">Paso 2 — identificar el grupo correcto.</strong> Con el remedio ya identificado por NOVA, se ubica en qué grupo cae (A-F) y si conviene complementar con un organopreparado-"suis" (grupo F) para el órgano afectado.</p>' +
      '<p><strong style="color:#fff;">Paso 3 — elegir la dilución.</strong> Como no se conoce la reactividad del paciente y el cuadro es crónico, se inicia con Injeel simple — potencias altas, efecto más suave, sin riesgo de reacciones iniciales intensas.</p>' +
      '<p><strong style="color:#fff;">Paso 4 — definir vía y frecuencia.</strong> Se inicia por vía oral (comprimidos o gotas, 3 veces al día) como tratamiento de mantenimiento; si no hay mejoría satisfactoria, se considera la vía parenteral (1-3 veces por semana).</p>' +
      '<p><strong style="color:#fff;">Paso 5 — interpretar la evolución.</strong> Si aparece una reactivación temporal de síntomas catarrales, se interpreta como posible vicariación regresiva (favorable) antes de asumir un empeoramiento y suspender el tratamiento.</p>' +
      '<p style="margin:0;"><strong style="color:#fff;">Conclusión:</strong> NOVA resuelve el "qué remedio" por síntoma; este módulo te da el "cómo" —grupo, dilución, vía, frecuencia— una vez que ya sabes cuál es.</p>';
  }},
  { label: "5 · Práctica", render: function(st) {
    var idx = st.practiceIndex || 0; var c = PRACTICE_CASES[idx]; var answered = st.practiceAnswers[idx];
    var html = '<div class="icon-badge">✏️</div><h3>Práctica clínica</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + PRACTICE_CASES.length + '</p><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickPractice('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<PRACTICE_CASES.length-1) html += '<button class="retry" onclick="nextPracticeCase()">Siguiente caso →</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste los casos de práctica. Continúa al diagnóstico diferencial.</p>'; }
    return html;
  }},
  { label: "6 · Diagnóstico diferencial", render: function(st) {
    var idx = st.diffIndex || 0; var c = DIFFERENTIAL_CASES[idx]; var answered = st.diffAnswers[idx];
    var html = '<div class="icon-badge">🔍</div><h3>Cuando dos ideas compiten</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + DIFFERENTIAL_CASES.length + '</p><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickDiff('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<DIFFERENTIAL_CASES.length-1) html += '<button class="retry" onclick="nextDiffCase()">Siguiente caso →</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste el diagnóstico diferencial.</p>'; }
    return html;
  }},
  { label: "7 · Evaluación", render: function(st) {
    var idx = st.quizIndex || 0;
    if (idx >= QUESTIONS.length) {
      var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
      var pct = Math.round((correct/QUESTIONS.length)*100); var passed = pct>=80;
      return '<div class="icon-badge">✅</div><h3>Resultado de la evaluación</h3><div class="card"><p style="font-size:32px;font-weight:700;margin:0 0 6px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">'+pct+'%</p><p style="margin:0;">'+correct+' de '+QUESTIONS.length+' correctas — '+(passed?"Aprobado (mínimo 80%)":"No aprobado, se requiere 80% o más")+'</p></div>' + (passed?"":'<button class="retry" onclick="restartQuiz()">Reintentar evaluación completa</button>');
    }
    var qu = QUESTIONS[idx]; var answered = st.quizAnswers[idx];
    var html = '<div class="icon-badge">✅</div><h3>Evaluación</h3><p class="subcounter">Reactivo ' + (idx+1) + ' de ' + QUESTIONS.length + '</p><div class="card"><p style="margin:0;font-weight:600;color:#fff;">' + qu.q + '</p></div>';
    qu.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===qu.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickQuiz('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===qu.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"Incorrecto — la respuesta correcta está marcada.")+'</p><button class="retry" onclick="nextQuizQuestion()">'+(idx===QUESTIONS.length-1?"Ver resultado":"Siguiente reactivo →")+'</button>'; }
    return html;
  }},
  { label: "8 · Resumen", render: function(st) {
    var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
    var pct = Math.round((correct/QUESTIONS.length)*100) || 0; var passed = pct>=80;
    return '<div class="icon-badge">🏁</div><h3>Resumen y siguiente paso</h3>' +
      '<ul style="padding-left:18px;font-size:13.5px;color:var(--text-secondary);line-height:1.8;margin-bottom:1rem;">' +
      '<li>La homotoxicología entiende la enfermedad como reacción defensiva ante homotoxinas — el tratamiento modula, no suprime, esa reacción.</li>' +
      '<li>Los 6 grupos (A-F) tienen reglas propias de dosificación, vía y elección — no son intercambiables.</li>' +
      '<li>Injeel simple/forte se elige según reactividad del paciente y si el cuadro es agudo o crónico.</li>' +
      '<li>Proinum® (contraindicación IV) y Cymeheel®/Disheel®/Ubicheel® (precaución IV) son las excepciones de vía que hay que recordar siempre.</li>' +
      '<li><strong style="color:var(--gold-light);">Este módulo no reemplaza el Índice Terapéutico completo:</strong> para "qué remedio específico ante qué motivo de consulta", consulta a NOVA en cada caso real — tiene el Compendio completo integrado.</li>' +
      '</ul>' +
      '<div class="card"><p style="font-weight:600;margin:0 0 4px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">Tu resultado: '+pct+'% — '+(passed?"módulo aprobado":"no aprobado, regresa a la celda 7 para reintentar")+'</p>' +
      '<p style="margin:8px 0 0;">Este módulo complementa directamente el de Sueroterapia, ya que varios antihomotóxicos (Traumeel S®, Lymphomyosot®, Zeel T®, etc.) son la base compartida entre ambos.</p></div>';
  }}
];

var state = { current: 0, practiceIndex: 0, practiceAnswers: {}, diffIndex: 0, diffAnswers: {}, quizIndex: 0, quizAnswers: {} };
function renderDots(){ var dots=document.getElementById("dots"); dots.innerHTML=""; CELLS.forEach(function(c,i){ var d=document.createElement("div"); d.className="dot"+(i===state.current?" active":""); dots.appendChild(d); }); }
function renderStage(){
  var stage=document.getElementById("stage");
  stage.innerHTML='<div class="cell active">'+CELLS[state.current].render(state)+'</div>';
  document.getElementById("cellLabel").textContent=CELLS[state.current].label;
  document.getElementById("backBtn").disabled=state.current===0;
  var nextBtn=document.getElementById("nextBtn"); var blocked=false;
  if(state.current===4) blocked=!(state.practiceIndex===PRACTICE_CASES.length-1 && state.practiceAnswers[PRACTICE_CASES.length-1]!==undefined);
  else if(state.current===5) blocked=!(state.diffIndex===DIFFERENTIAL_CASES.length-1 && state.diffAnswers[DIFFERENTIAL_CASES.length-1]!==undefined);
  else if(state.current===6) blocked=state.quizIndex<QUESTIONS.length;
  nextBtn.disabled=blocked;
  nextBtn.textContent = state.current===CELLS.length-1 ? "Reiniciar módulo" : (blocked?"Completa los casos para continuar":"Siguiente →");
  renderDots();
}
function pickPractice(i){ var idx=state.practiceIndex; if(state.practiceAnswers[idx]!==undefined) return; state.practiceAnswers[idx]=i; renderStage(); }
function nextPracticeCase(){ state.practiceIndex++; renderStage(); }
function pickDiff(i){ var idx=state.diffIndex; if(state.diffAnswers[idx]!==undefined) return; state.diffAnswers[idx]=i; renderStage(); }
function nextDiffCase(){ state.diffIndex++; renderStage(); }
function pickQuiz(i){ var idx=state.quizIndex; if(state.quizAnswers[idx]!==undefined) return; state.quizAnswers[idx]=i; renderStage(); }
function nextQuizQuestion(){ state.quizIndex++; renderStage(); }
function restartQuiz(){ state.quizIndex=0; state.quizAnswers={}; renderStage(); }
document.getElementById("backBtn").onclick=function(){ if(state.current>0){ state.current--; renderStage(); } };
document.getElementById("nextBtn").onclick=function(){ if(state.current<CELLS.length-1){ state.current++; renderStage(); } else { state={current:0,practiceIndex:0,practiceAnswers:{},diffIndex:0,diffAnswers:{},quizIndex:0,quizAnswers:{}}; renderStage(); } };
renderStage();
</script>

</html>
