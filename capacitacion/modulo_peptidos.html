<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Péptidos — ACTIVATE™</title>
<style>
  :root {
    --navy: #081327; --navy-800: #0f2444; --surface: #14294c;
    --teal: #12968a; --teal-light: #4fd1c0; --danger: #e0665f;
    --text: #eef2f6; --text-secondary: #a7b4c9; --radius: 14px;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--navy); color:var(--text); display:flex; justify-content:center; padding:32px 16px; }
  .wrap { width:100%; max-width:660px; }
  .dots { display:flex; gap:8px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--surface); transition:background .3s; }
  .dot.active { background:var(--teal-light); }
  .stage { position:relative; min-height:460px; max-height:640px; overflow-y:auto; background:var(--navy-800); border-radius:20px; padding:30px 28px; }
  .cell { opacity:0; transform:translateX(20px); transition:opacity .35s ease, transform .35s ease; }
  .cell.active { opacity:1; transform:translateX(0); }
  .icon-badge { width:56px; height:56px; border-radius:50%; background:rgba(79,209,192,0.12); display:flex; align-items:center; justify-content:center; margin-bottom:18px; font-size:26px; }
  h3 { margin:0 0 12px; font-size:20px; font-weight:600; color:#fff; }
  p { font-size:14.5px; line-height:1.7; color:var(--text-secondary); margin:0 0 12px; }
  .card { background:var(--surface); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; }
  .card p { margin:0; }
  .phase-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .phase-chip { background:var(--surface); border-radius:8px; padding:8px 10px; font-size:11.5px; text-align:center; flex:1; min-width:80px; border-bottom:3px solid var(--teal-light); }
  .opt { display:block; width:100%; text-align:left; background:var(--surface); color:var(--text); border:1.5px solid transparent; border-radius:10px; padding:11px 14px; font-size:13.5px; margin-bottom:8px; cursor:pointer; }
  .opt:hover { border-color:var(--teal); }
  .opt.correct { border-color:var(--teal-light); color:var(--teal-light); }
  .opt.wrong { border-color:var(--danger); color:var(--danger); }
  .feedback { font-size:13px; margin:8px 0 0; }
  .feedback.ok { color:var(--teal-light); }
  .feedback.bad { color:var(--danger); }
  .nav { display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
  button.navbtn { background:var(--teal); color:#04211d; border:none; border-radius:10px; padding:10px 18px; font-size:13.5px; font-weight:600; cursor:pointer; }
  button.navbtn.secondary { background:transparent; color:var(--text-secondary); border:1px solid var(--surface); }
  button.navbtn:disabled { opacity:0.3; cursor:default; }
  .label { font-size:11.5px; color:var(--text-secondary); letter-spacing:0.04em; text-transform:uppercase; }
  button.retry { background:transparent; border:1px solid var(--teal); color:var(--teal-light); border-radius:8px; padding:7px 14px; font-size:12.5px; margin-top:8px; cursor:pointer; }
  .subcounter { font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .rationale { border-left:2px solid var(--teal); padding-left:12px; margin-top:10px; }
  .nova-btn {
    position: fixed; bottom: 22px; right: 22px; z-index: 999;
    display: flex; align-items: center; gap: 8px;
    background: var(--teal); color: #04211d; text-decoration: none;
    font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700; font-size: 13px;
    padding: 12px 18px; border-radius: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    transition: transform .15s ease;
  }
  .nova-btn:hover { transform: translateY(-2px); }
  @media (max-width: 480px) {
    .nova-btn { bottom: 14px; right: 14px; padding: 10px 14px; font-size: 12px; }
  }
</style>
</head>
<body>
<a href="/portal-medico.html?nova=1" target="_blank" rel="noopener" class="nova-btn">💬 Preguntar a NOVA</a>
<div class="wrap">
  <div class="dots" id="dots"></div>
  <div class="stage" id="stage"></div>
  <div class="nav">
    <button class="navbtn secondary" id="backBtn">← Anterior</button>
    <span class="label" id="cellLabel"></span>
    <button class="navbtn" id="nextBtn">Siguiente →</button>
  </div>
</div>

<script>
var PRACTICE_CASES = [
  { caseText: "Un médico de nivel Certificado (Intermedio) evalúa a un paciente para iniciar ACTIVATE™ con fines de recuperación y rendimiento general, sin patología oncológica activa ni antecedente relevante.",
    opts: ["Es un candidato razonable para valorar ACTIVATE™, siempre con historia clínica completa antes de indicar.", "Los péptidos nunca deben indicarse fuera de un hospital.", "No se requiere historia clínica previa si el paciente 'se ve sano'."], correct: 0,
    rationale: "ACTIVATE™ amplía RESTORE™ agregando péptidos; el criterio de selección de candidatos exige, como con cualquier terapéutica, una historia clínica dirigida — antecedentes oncológicos, metabólicos y medicación actual — antes de indicar, no solo la impresión general del paciente." },
  { caseText: "Un paciente con antecedente oncológico activo, en seguimiento reciente, solicita incorporar péptidos a su plan.",
    opts: ["Se indica sin reservas, los péptidos no tienen relación con procesos oncológicos.", "Es un caso que exige valoración cuidadosa y, en general, cautela reforzada o referencia a interconsulta antes de indicar cualquier péptido con efecto proliferativo/regenerativo.", "Se indica automáticamente el nivel más alto disponible para acelerar resultados."], correct: 1,
    rationale: "El antecedente oncológico activo es una señal de alarma que exige cautela clínica reforzada frente a péptidos con mecanismos proliferativos o regenerativos — la indicación no es automática y amerita valoración cuidadosa, frecuentemente en conjunto con el equipo tratante oncológico." },
  { caseText: "Un médico certificado en RESTORE™ (Básico) quiere indicar péptidos a un paciente sin haber cursado la certificación de ACTIVATE™.",
    opts: ["Puede hacerlo libremente, la certificación de RESTORE™ ya cubre cualquier producto.", "Debe seguir el flujo correspondiente de la especificación de certificación (Flujo A o B) para acceder al nivel ACTIVATE™ antes de indicar péptidos de forma rutinaria.", "Los péptidos no requieren ninguna certificación adicional."], correct: 1,
    rationale: "El acceso a péptidos corresponde al nivel ACTIVATE™ (Intermedio) dentro del sistema de certificación clínica interno — un médico certificado solo en RESTORE™ debe completar la certificación correspondiente o seguir el Flujo B en un caso justificado, no indicar péptidos de forma rutinaria fuera de su nivel." },
  { caseText: "Un paciente en tratamiento con anticoagulantes orales solicita iniciar un péptido de uso frecuente en el protocolo ACTIVATE™.",
    opts: ["No representa ninguna interacción relevante a considerar.", "Amerita revisar interacciones potenciales y coordinar con el médico tratante antes de proceder, como con cualquier terapéutica nueva en un paciente polimedicado.", "Se debe suspender el anticoagulante sin consultar para poder iniciar el péptido."], correct: 1,
    rationale: "Todo paciente polimedicado, en particular con anticoagulación, requiere una revisión de interacciones y, cuando aplica, coordinación con el médico tratante antes de añadir cualquier terapéutica nueva — no se asume ausencia de interacción sin revisar." },
  { caseText: "Durante el seguimiento de un paciente en ACTIVATE™, refiere cefalea leve y transitoria tras la aplicación, sin otros síntomas de alarma.",
    opts: ["Se documenta el evento, se vigila la evolución, y se decide continuidad según tolerancia — no amerita suspensión automática de todo el protocolo.", "Se suspende de inmediato y de forma permanente cualquier terapéutica en ese paciente.", "Se ignora por completo sin documentar nada."], correct: 0,
    rationale: "Un evento leve y transitorio, sin signos de alarma, se documenta y se vigila su evolución — la conducta correcta es proporcional al evento, ni ignorarlo ni sobrerreaccionar suspendiendo el protocolo completo de forma automática." },
  { caseText: "Un paciente pregunta si puede combinar péptidos de ACTIVATE™ con su sueroterapia habitual de RESTORE™ en la misma sesión.",
    opts: ["No, son protocolos mutuamente excluyentes que nunca pueden coexistir.", "Sí — ACTIVATE™ se construye sobre RESTORE™, añadiendo péptidos a las capas ya existentes de sueroterapia y antihomotoxicología.", "Solo se puede combinar si el paciente está en nivel Avanzado."], correct: 1,
    rationale: "ACTIVATE™ no reemplaza a RESTORE™, lo amplía: añade péptidos a las capas de sueroterapia y antihomotoxicología ya existentes, por lo que la combinación es consistente con el diseño escalonado de los protocolos." }
];

var DIFFERENTIAL_CASES = [
  { caseText: "Dos pacientes en ACTIVATE™ presentan síntomas tras la aplicación. Paciente A: cefalea leve, transitoria, sin otros síntomas. Paciente B: cefalea intensa, súbita, con alteración visual y confusión.",
    opts: ["Ambos son un evento esperado y leve, se maneja igual con observación.", "Son cuadros distintos: A es un evento leve y esperable, se vigila y continúa según tolerancia; B tiene signos de alarma neurológica y exige evaluación médica urgente, no solo observación."], correct: 1,
    rationale: "Confundir un síntoma leve y transitorio con uno que tiene signos de alarma (cefalea súbita e intensa con alteración visual o del estado de consciencia) puede retrasar una atención urgente necesaria." },
  { caseText: "Un médico se pregunta si un paciente con antecedente oncológico ya resuelto hace más de 10 años, en remisión completa y con seguimiento activo negativo, debe tratarse igual que un paciente con enfermedad oncológica activa al considerar péptidos.",
    opts: ["Sí, cualquier antecedente oncológico —activo o no— contraindica de forma absoluta y permanente cualquier péptido.", "No necesariamente: la antigüedad, el estado de remisión y el seguimiento activo cambian el contexto de riesgo, pero la decisión sigue requiriendo valoración individualizada y, cuando es posible, coordinación con el equipo oncológico — no es una regla única para todos los antecedentes oncológicos."], correct: 1,
    rationale: "Tratar todo antecedente oncológico como si fuera equivalente —sin distinguir actividad de la enfermedad, tiempo de remisión y seguimiento— es un error de razonamiento clínico. El criterio exige valorar cada caso, no aplicar una regla absoluta única." },
  { caseText: "Un médico certificado en ACTIVATE™ atiende a un paciente que pide 'el protocolo más fuerte disponible' para acelerar resultados, sin justificación clínica adicional más allá de su preferencia.",
    opts: ["Se indica el nivel más alto disponible porque el paciente lo solicita y puede pagarlo.", "La indicación debe basarse en criterio clínico —historia, objetivo terapéutico real, riesgo/beneficio— y no en la preferencia o capacidad de pago del paciente por sí sola."], correct: 1,
    rationale: "La preferencia del paciente es relevante para la conversación, pero la indicación terapéutica se basa en criterio clínico, no en la solicitud de 'lo más fuerte' sin justificación médica — confundir demanda del paciente con indicación clínica es un error de razonamiento a evitar." }
];

var QUESTIONS = [
  { q: "¿Qué añade ACTIVATE™ (nivel Intermedio) sobre la base de RESTORE™?", opts: ["Biológicos de Regene Global", "Péptidos", "Únicamente nutracéuticos adicionales", "Ningún elemento nuevo"], correct: 1 },
  { q: "¿Qué debe revisarse siempre antes de indicar péptidos a un paciente nuevo?", opts: ["Solo su edad", "Historia clínica dirigida: antecedentes oncológicos, metabólicos y medicación actual", "Nada, basta con la impresión clínica general", "Únicamente su ocupación"], correct: 1 },
  { q: "Ante un paciente con antecedente oncológico activo que solicita péptidos, ¿cuál es la conducta correcta?", opts: ["Indicar sin reservas", "Valoración cuidadosa, cautela reforzada y frecuentemente interconsulta con el equipo oncológico tratante", "Indicar automáticamente el nivel más alto", "Rechazar toda atención al paciente"], correct: 1 },
  { q: "¿Qué debe hacer un médico certificado solo en RESTORE™ que quiere indicar péptidos de forma rutinaria?", opts: ["Puede hacerlo libremente", "Completar la certificación correspondiente a ACTIVATE™, o seguir el Flujo B en un caso justificado", "Los péptidos no requieren ninguna certificación", "Debe pedir autorización del paciente únicamente"], correct: 1 },
  { q: "¿Qué debe considerarse en un paciente polimedicado (ej. anticoagulado) antes de iniciar un péptido?", opts: ["Nada, no hay interacciones relevantes en general", "Revisar interacciones potenciales y coordinar con el médico tratante", "Suspender la medicación previa sin consultar", "Solo preguntar si el paciente se siente bien"], correct: 1 },
  { q: "Ante cefalea leve y transitoria tras la aplicación de un péptido, sin otros síntomas, ¿qué se recomienda?", opts: ["Suspender el protocolo completo de forma permanente", "Documentar, vigilar evolución y decidir continuidad según tolerancia", "Ignorar el síntoma sin registro", "Aumentar la dosis para 'superar' el síntoma"], correct: 1 },
  { q: "¿Es correcto combinar péptidos de ACTIVATE™ con la sueroterapia y antihomotoxicología de RESTORE™?", opts: ["No, son protocolos excluyentes", "Sí, ACTIVATE™ se construye añadiendo péptidos sobre las capas de RESTORE™", "Solo en nivel Avanzado", "Solo si el paciente lo solicita por escrito"], correct: 1 },
  { q: "Ante cefalea súbita, intensa, con alteración visual y confusión tras la aplicación, ¿qué se debe hacer?", opts: ["Observar en casa sin intervención", "Evaluación médica urgente, por signos de alarma neurológica", "Continuar el protocolo sin cambios", "Repetir la dosis para confirmar el efecto"], correct: 1 },
  { q: "¿Un antecedente oncológico en remisión completa desde hace más de una década, con seguimiento activo negativo, debe tratarse igual que uno activo al valorar péptidos?", opts: ["Sí, cualquier antecedente oncológico contraindica de forma absoluta y permanente", "No necesariamente — el contexto (actividad, tiempo de remisión, seguimiento) cambia el riesgo, pero sigue exigiendo valoración individualizada", "No tiene ninguna relevancia clínica en ningún caso", "Solo importa si el paciente lo menciona espontáneamente"], correct: 1 },
  { q: "Un paciente pide 'el protocolo más fuerte' sin justificación clínica adicional. ¿Cuál es la conducta correcta?", opts: ["Indicarlo porque el paciente puede pagarlo", "Basar la indicación en criterio clínico —historia, objetivo terapéutico, riesgo/beneficio— no en la preferencia del paciente por sí sola", "Negar cualquier atención a ese paciente", "Derivarlo sin dar ninguna explicación"], correct: 1 },
  { q: "¿Qué distingue clínicamente a un evento adverso leve de uno con signos de alarma tras la aplicación de un péptido?", opts: ["No hay ninguna diferencia relevante", "El leve es transitorio y sin compromiso sistémico; el de alarma incluye síntomas neurológicos, cardiovasculares o progresivos que requieren evaluación urgente", "Todo evento adverso requiere suspender el protocolo de forma permanente", "Los eventos adversos nunca ocurren con péptidos"], correct: 1 },
  { q: "¿Qué rol cumple la certificación clínica interna frente al acceso a péptidos?", opts: ["Ninguno, cualquier médico afiliado puede indicarlos sin restricción", "Define el nivel (ACTIVATE™) que habilita su uso rutinario, según el sistema de certificación de CODE CELLS®", "Solo aplica a biológicos, no a péptidos", "Es un trámite exclusivamente administrativo sin relación clínica"], correct: 1 },
  { q: "¿Qué se prioriza al decidir si un paciente polimedicado es candidato a péptidos?", opts: ["La preferencia estética del paciente únicamente", "La seguridad: revisión de interacciones y coordinación con el tratamiento de base", "El tiempo disponible en la agenda del médico", "El costo del producto exclusivamente"], correct: 1 },
  { q: "¿Cuál es el criterio para decidir si continuar un protocolo tras un evento adverso leve?", opts: ["Suspender siempre de forma automática", "Evaluar tolerancia y evolución del evento antes de decidir continuidad", "Aumentar la dosis para comprobar tolerancia real", "Ignorar el evento si el paciente no insiste"], correct: 1 },
  { q: "¿ACTIVATE™ sustituye a RESTORE™ o lo amplía?", opts: ["Lo sustituye por completo", "Lo amplía, añadiendo péptidos sobre las capas ya existentes", "No tiene relación alguna con RESTORE™", "Los reemplaza únicamente en pacientes mayores de 60 años"], correct: 1 },
  { q: "¿Qué antecedente exige mayor cautela clínica antes de indicar péptidos con efecto proliferativo/regenerativo?", opts: ["Antecedente de alergia estacional leve", "Antecedente oncológico activo", "Antecedente de haber usado suplementos vitamínicos", "Ser mayor de 40 años sin otra condición"], correct: 1 },
  { q: "¿Qué significa 'signos de alarma' en el seguimiento de un paciente con péptidos?", opts: ["Cualquier molestia mínima sin importancia", "Síntomas que sugieren compromiso sistémico o neurológico progresivo, que ameritan evaluación médica urgente", "Solo la insatisfacción estética del paciente", "Un evento que ocurre después de dos semanas del tratamiento, sin importar su naturaleza"], correct: 1 },
  { q: "¿Qué principio guía la decisión clínica frente a la solicitud de un paciente de 'acelerar resultados' con más producto del indicado?", opts: ["Acceder siempre a la solicitud del paciente", "Mantener la indicación basada en criterio clínico de riesgo/beneficio, no en la demanda del paciente por sí sola", "Aumentar la dosis sin evaluar razón clínica", "Delegar la decisión completamente al paciente"], correct: 1 },
  { q: "¿Qué debe documentarse siempre tras un evento adverso, incluso uno leve?", opts: ["No es necesario documentar eventos leves", "El evento, su evolución y la decisión de continuidad tomada", "Solo si el paciente lo solicita por escrito", "Solo eventos que requieran hospitalización"], correct: 1 },
  { q: "¿Qué rol tiene la interconsulta con el equipo oncológico tratante en pacientes con antecedente activo que buscan péptidos?", opts: ["Ninguno, la decisión es exclusiva del médico de CODE CELLS®", "Frecuentemente necesaria para valorar riesgo/beneficio antes de cualquier indicación", "Solo aplica si el paciente lo solicita expresamente", "Sustituye por completo la valoración clínica propia"], correct: 1 }
];

var CELLS = [
  { label: "1 · Bienvenida", render: function() {
    return '<div class="icon-badge">🧬</div><h3>Péptidos — ACTIVATE™</h3>' +
      '<p>ACTIVATE™ es el nivel Intermedio: construye sobre RESTORE™ añadiendo péptidos. Este módulo asegura que la selección de candidatos y el manejo de eventos adversos se hagan con el mismo rigor que cualquier otra terapéutica.</p>' +
      '<div class="card"><p style="font-weight:600;color:#fff;margin-bottom:4px;">Objetivo de este módulo</p>' +
      '<p style="margin:0;">Podrás identificar criterios de selección de candidatos a péptidos, reconocer señales de alarma que exigen cautela reforzada, y distinguir eventos adversos leves de aquellos que requieren evaluación urgente.</p></div>';
  }},
  { label: "2 · Contexto", render: function() {
    return '<div class="icon-badge">💡</div><h3>¿Por qué importa esto?</h3>' +
      '<p>Los péptidos son la capa que distingue a ACTIVATE™ de RESTORE™, y suelen percibirse como "más fuertes" sin que eso se traduzca en un criterio clínico más estricto de selección.</p>' +
      '<div class="card"><p style="font-weight:600;color:#fff;margin-bottom:4px;">Error frecuente</p>' +
      '<p style="margin:0;">Indicar péptidos según la preferencia o capacidad de pago del paciente ("quiero el protocolo más fuerte") en vez de un criterio clínico de riesgo/beneficio — y tratar cualquier antecedente oncológico como si fuera una regla única, sin distinguir actividad, remisión o seguimiento.</p></div>';
  }},
  { label: "3 · Concepto", render: function() {
    return '<div class="icon-badge">📚</div><h3>De RESTORE™ a ACTIVATE™</h3>' +
      '<div class="phase-row"><div class="phase-chip">Sueroterapia IV</div><div class="phase-chip">Antihomotoxicología</div><div class="phase-chip">+ Péptidos</div></div>' +
      '<p>ACTIVATE™ no reemplaza a RESTORE™: añade péptidos sobre las mismas capas ya existentes.</p>' +
      '<h3 style="font-size:16px;">Criterios de selección</h3>' +
      '<div class="card"><p style="margin:0;">Historia clínica dirigida (antecedentes oncológicos, metabólicos, medicación actual), antecedente oncológico activo como señal de alarma que exige cautela reforzada, y revisión de interacciones en pacientes polimedicados (ej. anticoagulados).</p></div>' +
      '<h3 style="font-size:16px;">Eventos adversos: leve vs. de alarma</h3>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Leve:</strong> transitorio, sin compromiso sistémico — se documenta y vigila. <strong style="color:#fff;">De alarma:</strong> síntomas neurológicos, cardiovasculares o progresivos — exige evaluación urgente.</p></div>';
  }},
  { label: "4 · Ejemplo guiado", render: function() {
    return '<div class="icon-badge">🩺</div><h3>Ejemplo guiado</h3>' +
      '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Caso:</strong> Paciente sin antecedentes relevantes pide "el protocolo más fuerte" para acelerar resultados estéticos.</p></div>' +
      '<p><strong style="color:#fff;">Paso 1 — separar demanda de indicación.</strong> La solicitud del paciente es información relevante para la conversación, no un criterio clínico por sí sola.</p>' +
      '<p><strong style="color:#fff;">Paso 2 — historia clínica dirigida.</strong> Se revisan antecedentes oncológicos, metabólicos y medicación actual antes de decidir cualquier cosa.</p>' +
      '<p><strong style="color:#fff;">Paso 3 — indicación basada en objetivo real.</strong> Se indica según riesgo/beneficio y objetivo terapéutico, no según "qué tan fuerte" lo pida el paciente.</p>' +
      '<p style="margin:0;"><strong style="color:#fff;">Conclusión:</strong> el criterio clínico, no la demanda del paciente, es lo que determina la indicación.</p>';
  }},
  { label: "5 · Práctica", render: function(st) {
    var idx = st.practiceIndex || 0; var c = PRACTICE_CASES[idx]; var answered = st.practiceAnswers[idx];
    var html = '<div class="icon-badge">✏️</div><h3>Práctica clínica</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + PRACTICE_CASES.length + '</p><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickPractice('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<PRACTICE_CASES.length-1) html += '<button class="retry" onclick="nextPracticeCase()">Siguiente caso →</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste los casos de práctica. Continúa al diagnóstico diferencial.</p>'; }
    return html;
  }},
  { label: "6 · Diagnóstico diferencial", render: function(st) {
    var idx = st.diffIndex || 0; var c = DIFFERENTIAL_CASES[idx]; var answered = st.diffAnswers[idx];
    var html = '<div class="icon-badge">🔍</div><h3>Cuando dos criterios compiten</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + DIFFERENTIAL_CASES.length + '</p><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickDiff('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<DIFFERENTIAL_CASES.length-1) html += '<button class="retry" onclick="nextDiffCase()">Siguiente caso →</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste el diagnóstico diferencial.</p>'; }
    return html;
  }},
  { label: "7 · Evaluación", render: function(st) {
    var idx = st.quizIndex || 0;
    if (idx >= QUESTIONS.length) {
      var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
      var pct = Math.round((correct/QUESTIONS.length)*100); var passed = pct>=80;
      return '<div class="icon-badge">✅</div><h3>Resultado de la evaluación</h3><div class="card"><p style="font-size:32px;font-weight:700;margin:0 0 6px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">'+pct+'%</p><p style="margin:0;">'+correct+' de '+QUESTIONS.length+' correctas — '+(passed?"Aprobado (mínimo 80%)":"No aprobado, se requiere 80% o más")+'</p></div>' + (passed?"":'<button class="retry" onclick="restartQuiz()">Reintentar evaluación completa</button>');
    }
    var qu = QUESTIONS[idx]; var answered = st.quizAnswers[idx];
    var html = '<div class="icon-badge">✅</div><h3>Evaluación</h3><p class="subcounter">Reactivo ' + (idx+1) + ' de ' + QUESTIONS.length + '</p><div class="card"><p style="margin:0;font-weight:600;color:#fff;">' + qu.q + '</p></div>';
    qu.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===qu.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickQuiz('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===qu.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"Incorrecto — la respuesta correcta está marcada.")+'</p><button class="retry" onclick="nextQuizQuestion()">'+(idx===QUESTIONS.length-1?"Ver resultado":"Siguiente reactivo →")+'</button>'; }
    return html;
  }},
  { label: "8 · Resumen", render: function(st) {
    var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
    var pct = Math.round((correct/QUESTIONS.length)*100) || 0; var passed = pct>=80;
    return '<div class="icon-badge">🏁</div><h3>Resumen y siguiente paso</h3>' +
      '<ul style="padding-left:18px;font-size:13.5px;color:var(--text-secondary);line-height:1.8;margin-bottom:1rem;">' +
      '<li>ACTIVATE™ amplía RESTORE™ añadiendo péptidos — no lo sustituye.</li>' +
      '<li>Antecedente oncológico activo exige cautela reforzada e interconsulta, sin ser una regla absoluta única para todo antecedente oncológico.</li>' +
      '<li>La indicación se basa en criterio clínico de riesgo/beneficio, nunca en la preferencia o demanda del paciente por sí sola.</li>' +
      '</ul>' +
      '<div class="card"><p style="font-weight:600;margin:0 0 4px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">Tu resultado: '+pct+'% — '+(passed?"módulo aprobado":"no aprobado, regresa a la celda 7 para reintentar")+'</p>' +
      '<p style="margin:8px 0 0;">Siguiente módulo sugerido: Exosomas (GENESIS™).</p></div>';
  }}
];

var state = { current: 0, practiceIndex: 0, practiceAnswers: {}, diffIndex: 0, diffAnswers: {}, quizIndex: 0, quizAnswers: {} };
function renderDots(){ var dots=document.getElementById("dots"); dots.innerHTML=""; CELLS.forEach(function(c,i){ var d=document.createElement("div"); d.className="dot"+(i===state.current?" active":""); dots.appendChild(d); }); }
function renderStage(){
  var stage=document.getElementById("stage");
  stage.innerHTML='<div class="cell active">'+CELLS[state.current].render(state)+'</div>';
  document.getElementById("cellLabel").textContent=CELLS[state.current].label;
  document.getElementById("backBtn").disabled=state.current===0;
  var nextBtn=document.getElementById("nextBtn"); var blocked=false;
  if(state.current===4) blocked=!(state.practiceIndex===PRACTICE_CASES.length-1 && state.practiceAnswers[PRACTICE_CASES.length-1]!==undefined);
  else if(state.current===5) blocked=!(state.diffIndex===DIFFERENTIAL_CASES.length-1 && state.diffAnswers[DIFFERENTIAL_CASES.length-1]!==undefined);
  else if(state.current===6) blocked=state.quizIndex<QUESTIONS.length;
  nextBtn.disabled=blocked;
  nextBtn.textContent = state.current===CELLS.length-1 ? "Reiniciar módulo" : (blocked?"Completa los casos para continuar":"Siguiente →");
  renderDots();
}
function pickPractice(i){ var idx=state.practiceIndex; if(state.practiceAnswers[idx]!==undefined) return; state.practiceAnswers[idx]=i; renderStage(); }
function nextPracticeCase(){ state.practiceIndex++; renderStage(); }
function pickDiff(i){ var idx=state.diffIndex; if(state.diffAnswers[idx]!==undefined) return; state.diffAnswers[idx]=i; renderStage(); }
function nextDiffCase(){ state.diffIndex++; renderStage(); }
function pickQuiz(i){ var idx=state.quizIndex; if(state.quizAnswers[idx]!==undefined) return; state.quizAnswers[idx]=i; renderStage(); }
function nextQuizQuestion(){ state.quizIndex++; renderStage(); }
function restartQuiz(){ state.quizIndex=0; state.quizAnswers={}; renderStage(); }
document.getElementById("backBtn").onclick=function(){ if(state.current>0){ state.current--; renderStage(); } };
document.getElementById("nextBtn").onclick=function(){ if(state.current<CELLS.length-1){ state.current++; renderStage(); } else { state={current:0,practiceIndex:0,practiceAnswers:{},diffIndex:0,diffAnswers:{},quizIndex:0,quizAnswers:{}}; renderStage(); } };
renderStage();
</script>
</body>
</html>
