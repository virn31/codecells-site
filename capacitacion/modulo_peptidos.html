function renderMoleculeCell(m) {
  var stars = '';

  var html = '<div class="icon-badge">' + String.fromCodePoint(0x1F48A) + '</div>';
  html += '<span class="tag tag-' + m.tag + '">' + tagLabelOf(m.tag) + '</span>';
  html += '<h3>' + m.n + '. ' + m.nombre + '</h3>';
  html += '<div class="metagrid">';
  html += '<div class="metabox"><div class="mlabel">Categoría</div><div class="mval">' + m.categoria + '</div></div>';
  html += '<div class="metabox"><div class="mlabel">Dificultad</div><div class="mval">' + m.dificultad + '</div></div>';
  html += '<div class="metabox"><div class="mlabel">Nivel de evidencia</div><div class="mval stars">' + stars + '</div></div>';
  html += '<div class="metabox"><div class="mlabel">Estado regulatorio</div><div class="mval">' + m.estadoRegulatorio + '</div></div>';
  html += '</div>';
  if (m.nota) html += '<div class="card" style="border-left:3px solid var(--gold-light);"><p style="margin:0;">' + m.nota + '</p></div>';

  var fields = [
    ["Objetivo de aprendizaje", m.objetivo],
    ["Palabras clave", m.palabrasClave],
    ["Que es", m.queEs],
    ["Historia breve", m.historia],
    ["Origen", m.origen],
    ["Como funciona", m.comoFunciona],
    ["Cuando pensar en esta molecula", m.cuandoPensar]
  ];
  fields.forEach(function(f) {
    html += '<div class="fieldrow"><div class="flabel">' + f[0] + '</div><div class="fvalue">' + f[1] + '</div></div>';
  });
  html += '<div class="fieldrow"><div class="flabel">Beneficios principales</div><div class="fvalue"><ul>' + m.beneficios.map(function(b){return '<li>'+b+'</li>';}).join('') + '</ul></div></div>';

  var fields2 = [
    ["Presentaciones habituales", m.presentaciones],
    ["Conceptos generales de preparacion", m.preparacion],
    ["Via de administracion", m.via],
    ["Frecuencia habitual", m.frecuencia],
    ["Efectos adversos frecuentes", m.efectosAdversos],
    ["Contraindicaciones principales", m.contraindicaciones],
    ["Perlas clinicas", m.perlas],
    ["Resumen rapido", m.resumen],
    ["Bibliografia especifica", m.bibliografia]
  ];
  fields2.forEach(function(f) {
    html += '<div class="fieldrow"><div class="flabel">' + f[0] + '</div><div class="fvalue">' + f[1] + '</div></div>';
  });

  html += '<div class="autoeval"><b style="color:#fff;">Autoevaluacion:</b><br>1) ' + m.autoeval[0] + '<br>2) ' + m.autoeval[1] + '</div>';
  return html;
}

        '<div class="colcard aprob"><h4>Aprobado</h4><ul><li>Semaglutida</li><li>Liraglutida</li><li>Tirzepatida</li><li>PT-141</li><li>Tesamorelin</li></ul></div>' +
        '<div class="colcard var"><h4>Uso variable</h4><ul><li>NAD+</li><li>GHK-Cu</li><li>Thymosin Alpha-1</li><li>Glutation</li></ul></div>' +
        '<div class="colcard inv"><h4>Investigacion</h4><ul><li>Retatrutida</li><li>BPC-157</li><li>Epitalon</li><li>CJC-1295 / DAC</li><li>Ipamorelin</li><li>Sermorelin</li></ul></div>' +
      '</div>' +
      '<p>Las siguientes 16 celdas te dan la ficha completa de cada molecula, con el mismo formato para todas.</p>';
  }}
];

MOLECULES.forEach(function(m) {
  CELLS.push({ label: m.n + " . " + m.nombre, render: function() { return renderMoleculeCell(m); } });
});

var IDX_PRACTICA = CELLS.length + 1;
var IDX_DIFF = IDX_PRACTICA + 1;
var IDX_EVAL = IDX_DIFF + 1;

CELLS.push({ label: "Ejemplo guiado", render: function() {
  return '<div class="icon-badge">' + String.fromCodePoint(0x1FA7A) + '</div><h3>Ejemplo guiado</h3>' +
    '<div class="card"><p style="margin:0;"><strong style="color:#fff;">Caso:</strong> Un paciente sin antecedentes relevantes pide Epitalon y CJC-1295 "para verse y sentirse mas joven", sin ninguna justificacion clinica adicional.</p></div>' +
    '<p><strong style="color:#fff;">Paso 1 - separar demanda de indicacion.</strong> La solicitud del paciente es informacion relevante, no un criterio clinico por si sola.</p>' +
    '<p><strong style="color:#fff;">Paso 2 - nombrar el estatus regulatorio con honestidad.</strong> Ambos son compuestos de investigacion.</p>' +
    '<p><strong style="color:#fff;">Paso 3 - historia clinica dirigida.</strong> El cancer activo contraindica los secretagogos de GH.</p>' +
    '<p><strong style="color:#fff;">Paso 4 - consentimiento reforzado si se procede.</strong> Se documenta el estatus de investigacion explicitamente.</p>' +
    '<p style="margin:0;"><strong style="color:#fff;">Conclusion:</strong> el criterio clinico y la transparencia regulatoria determinan la indicacion.</p>';
}});

CELLS.push({ label: "Practica", render: function(st) {
  var idx = st.practiceIndex || 0; var c = PRACTICE_CASES[idx]; var answered = st.practiceAnswers[idx];
  var html = '<div class="icon-badge">' + String.fromCodePoint(0x270F) + '</div><h3>Practica clinica</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + PRACTICE_CASES.length + '</p><span class="tag tag-'+c.tag+'">'+tagLabelOf(c.tag)+'</span><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
  c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickPractice('+i+')">'+o+'</button>'; });
  if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
    if(idx<PRACTICE_CASES.length-1) html += '<button class="retry" onclick="nextPracticeCase()">Siguiente caso -></button>';
    else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste los casos de practica.</p>'; }
  return html;
}});

CELLS.push({ label: "Diagnostico diferencial", render: function(st) {
  var idx = st.diffIndex || 0; var c = DIFFERENTIAL_CASES[idx]; var answered = st.diffAnswers[idx];
  var html = '<div class="icon-badge">' + String.fromCodePoint(0x1F50D) + '</div><h3>Cuando dos moleculas se confunden</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + DIFFERENTIAL_CASES.length + '</p><span class="tag tag-'+c.tag+'">'+tagLabelOf(c.tag)+'</span><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
  c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickDiff('+i+')">'+o+'</button>'; });
  if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
    if(idx<DIFFERENTIAL_CASES.length-1) html += '<button class="retry" onclick="nextDiffCase()">Siguiente caso -></button>';
    else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste el diagnostico diferencial.</p>'; }
  return html;
}});

CELLS.push({ label: "Evaluacion", render: function(st) {
  var idx = st.quizIndex || 0;
  if (idx >= QUESTIONS.length) {
    var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
    var pct = Math.round((correct/QUESTIONS.length)*100); var passed = pct>=80;
    return '<div class="icon-badge">' + String.fromCodePoint(0x2705) + '</div><h3>Resultado de la evaluacion</h3><div class="card"><p style="font-size:32px;font-weight:700;margin:0 0 6px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">'+pct+'%</p><p style="margin:0;">'+correct+' de '+QUESTIONS.length+' correctas - '+(passed?"Aprobado (minimo 80%)":"No aprobado, se requiere 80% o mas")+'</p></div>' + (passed?"":'<button class="retry" onclick="restartQuiz()">Reintentar evaluacion completa</button>');
  }
  var qu = QUESTIONS[idx]; var answered = st.quizAnswers[idx];
  var html = '<div class="icon-badge">' + String.fromCodePoint(0x2705) + '</div><h3>Evaluacion - 20 reactivos</h3><p class="subcounter">Reactivo ' + (idx+1) + ' de ' + QUESTIONS.length + '</p><div class="card"><p style="margin:0;font-weight:600;color:#fff;">' + qu.q + '</p></div>';
  qu.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===qu.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickQuiz('+i+')">'+o+'</button>'; });
  if(answered!==undefined){ var ok=answered===qu.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"Incorrecto - la respuesta correcta esta marcada.")+'</p><button class="retry" onclick="nextQuizQuestion()">'+(idx===QUESTIONS.length-1?"Ver resultado":"Siguiente reactivo ->")+'</button>'; }
  return html;
}});

CELLS.push({ label: "Resumen", render: function(st) {
  var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
  var pct = Math.round((correct/QUESTIONS.length)*100) || 0; var passed = pct>=80;
  return '<div class="icon-badge">' + String.fromCodePoint(0x1F3C1) + '</div><h3>Resumen y siguiente paso</h3>' +
    '<ul style="padding-left:18px;font-size:13.5px;color:var(--text-secondary);line-height:1.8;margin-bottom:1rem;">' +
    '<li>16 moleculas cubiertas con ficha completa: 5 aprobadas, 4 de uso variable, 7 de investigacion.</li>' +
    '<li>Compartir mecanismo o eje fisiologico no implica compartir estatus regulatorio.</li>' +
    '<li>Todo compuesto de investigacion exige transparencia explicita y consentimiento reforzado.</li>' +
    '</ul>' +
    '<div class="card"><p style="font-weight:600;margin:0 0 4px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">Tu resultado: '+pct+'% - '+(passed?"modulo aprobado":"no aprobado, regresa a la evaluacion para reintentar")+'</p>' +
    '<p style="margin:8px 0 0;">Siguiente modulo sugerido: Exosomas (GENESIS(tm)).</p></div>';
}});

var state = { current: 0, practiceIndex: 0, practiceAnswers: {}, diffIndex: 0, diffAnswers: {}, quizIndex: 0, quizAnswers: {} };
function renderDots(){ var dots=document.getElementById("dots"); dots.innerHTML=""; CELLS.forEach(function(c,i){ var d=document.createElement("div"); d.className="dot"+(i===state.current?" active":""); dots.appendChild(d); }); }
function renderStage(){
  var stage=document.getElementById("stage");
  stage.innerHTML='<div class="cell active">'+CELLS[state.current].render(state)+'</div>';
  document.getElementById("cellLabel").textContent=CELLS[state.current].label;
  document.getElementById("backBtn").disabled=state.current===0;
  var nextBtn=document.getElementById("nextBtn"); var blocked=false;
  if(state.current===IDX_PRACTICA) blocked=!(state.practiceIndex===PRACTICE_CASES.length-1 && state.practiceAnswers[PRACTICE_CASES.length-1]!==undefined);
  else if(state.current===IDX_DIFF) blocked=!(state.diffIndex===DIFFERENTIAL_CASES.length-1 && state.diffAnswers[DIFFERENTIAL_CASES.length-1]!==undefined);
  else if(state.current===IDX_EVAL) blocked=state.quizIndex<QUESTIONS.length;
  nextBtn.disabled=blocked;
  nextBtn.textContent = state.current===CELLS.length-1 ? "Reiniciar modulo" : (blocked?"Completa los casos para continuar":"Siguiente ->");
  renderDots();
  stage.scrollTop = 0;
}
function pickPractice(i){ var idx=state.practiceIndex; if(state.practiceAnswers[idx]!==undefined) return; state.practiceAnswers[idx]=i; renderStage(); }
function nextPracticeCase(){ state.practiceIndex++; renderStage(); }
function pickDiff(i){ var idx=state.diffIndex; if(state.diffAnswers[idx]!==undefined) return; state.diffAnswers[idx]=i; renderStage(); }
function nextDiffCase(){ state.diffIndex++; renderStage(); }
function pickQuiz(i){ var idx=state.quizIndex; if(state.quizAnswers[idx]!==undefined) return; state.quizAnswers[idx]=i; renderStage(); }
function nextQuizQuestion(){ state.quizIndex++; renderStage(); }
function restartQuiz(){ state.quizIndex=0; state.quizAnswers={}; renderStage(); }
document.getElementById("backBtn").onclick=function(){ if(state.current>0){ state.current--; renderStage(); } };
document.getElementById("nextBtn").onclick=function(){ if(state.current<CELLS.length-1){ state.current++; renderStage(); } else { state={current:0,practiceIndex:0,practiceAnswers:{},diffIndex:0,diffAnswers:{},quizIndex:0,quizAnswers:{}}; renderStage(); } };
renderStage();
</script>
</body>
</html>
