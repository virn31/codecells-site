    var html = '<div class="icon-badge">âœڈï¸ڈ</div><h3>Prأ،ctica integrada</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + PRACTICE_CASES.length + '</p><span class="tag tag-'+c.level+'">'+tagLabel+'</span><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickPractice('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<PRACTICE_CASES.length-1) html += '<button class="retry" onclick="nextPracticeCase()">Siguiente caso â†’</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste los casos de prأ،ctica. Continأ؛a al diagnأ³stico diferencial.</p>'; }
    return html;
  }},
  { label: "6 آ· Diagnأ³stico diferencial", render: function(st) {
    var idx = st.diffIndex || 0; var c = DIFFERENTIAL_CASES[idx]; var answered = st.diffAnswers[idx];
    var html = '<div class="icon-badge">ًں”چ</div><h3>Cuando dos niveles compiten</h3><p class="subcounter">Caso ' + (idx+1) + ' de ' + DIFFERENTIAL_CASES.length + '</p><div class="card"><p style="margin:0;">' + c.caseText + '</p></div>';
    c.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===c.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickDiff('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===c.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"No es correcto.")+'</p><p class="rationale">'+c.rationale+'</p>';
      if(idx<DIFFERENTIAL_CASES.length-1) html += '<button class="retry" onclick="nextDiffCase()">Siguiente caso â†’</button>';
      else html += '<p style="font-size:13px;color:var(--teal-light);margin-top:10px;">Terminaste el diagnأ³stico diferencial.</p>'; }
    return html;
  }},
  { label: "7 آ· Evaluaciأ³n", render: function(st) {
    var idx = st.quizIndex || 0;
    if (idx >= QUESTIONS.length) {
      var correct=0; QUESTIONS.forEach(function(qu,qi){ if(st.quizAnswers[qi]===qu.correct) correct++; });
      var pct = Math.round((correct/QUESTIONS.length)*100); var passed = pct>=80;
      return '<div class="icon-badge">âœ…</div><h3>Resultado de la evaluaciأ³n</h3><div class="card"><p style="font-size:32px;font-weight:700;margin:0 0 6px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">'+pct+'%</p><p style="margin:0;">'+correct+' de '+QUESTIONS.length+' correctas â€” '+(passed?"Aprobado (mأ­nimo 80%)":"No aprobado, se requiere 80% o mأ،s")+'</p></div>' + (passed?"":'<button class="retry" onclick="restartQuiz()">Reintentar evaluaciأ³n completa</button>');
    }
    var qu = QUESTIONS[idx]; var answered = st.quizAnswers[idx];
    var tagLabel = qu.level==="basico"?"BأپSICO":(qu.level==="intermedio"?"INTERMEDIO":(qu.level==="avanzado"?"AVANZADO":"PUENTE"));
    var tagClass = qu.level==="puente"?"tag-intermedio":"tag-"+qu.level;
    var html = '<div class="icon-badge">âœ…</div><h3>Evaluaciأ³n</h3><p class="subcounter">Reactivo ' + (idx+1) + ' de ' + QUESTIONS.length + '</p><span class="tag '+tagClass+'">'+tagLabel+'</span><div class="card"><p style="margin:0;font-weight:600;color:#fff;">' + qu.q + '</p></div>';
    qu.opts.forEach(function(o,i){ var cls="opt"; if(answered!==undefined){ if(i===qu.correct) cls+=" correct"; else if(i===answered) cls+=" wrong"; } html += '<button class="'+cls+'" onclick="pickQuiz('+i+')">'+o+'</button>'; });
    if(answered!==undefined){ var ok=answered===qu.correct; html += '<p class="feedback '+(ok?"ok":"bad")+'">'+(ok?"Correcto.":"Incorrecto â€” la respuesta correcta estأ، marcada.")+'</p><button class="retry" onclick="nextQuizQuestion()">'+(idx===QUESTIONS.length-1?"Ver resultado":"Siguiente reactivo â†’")+'</button>'; }
    return html;
  }},
  { label: "8 آ· Resumen", render: function(st) {
    var correct=0; var byLevel={basico:{c:0,t:0},intermedio:{c:0,t:0},avanzado:{c:0,t:0},puente:{c:0,t:0}};
    QUESTIONS.forEach(function(qu,qi){ byLevel[qu.level].t++; if(st.quizAnswers[qi]===qu.correct){ correct++; byLevel[qu.level].c++; } });
    var pct = Math.round((correct/QUESTIONS.length)*100) || 0; var passed = pct>=80;
    return '<div class="icon-badge">ًںڈپ</div><h3>Resumen y siguiente paso</h3>' +
      '<ul style="padding-left:18px;font-size:13.5px;color:var(--text-secondary);line-height:1.8;margin-bottom:1rem;">' +
      '<li>RESTOREâ„¢, ACTIVATEâ„¢ y GENESISâ„¢ son niveles acumulativos, no protocolos aislados.</li>' +
      '<li>Cada nivel exige su propia certificaciأ³n clأ­nica â€” no se hereda del nivel anterior ni de experiencia general con inyectables.</li>' +
      '<li>El Flujo B permite acceso inmediato ante urgencia clأ­nica real, con compromiso de capacitaciأ³n en 7 dأ­as naturales.</li>' +
      '</ul>' +
      '<div class="card"><p style="font-weight:600;margin:0 0 4px;color:'+(passed?"var(--teal-light)":"var(--danger)")+';">Tu resultado: '+pct+'% â€” '+(passed?"mأ³dulo aprobado":"no aprobado, regresa a la celda 7 para reintentar")+'</p>' +
      '<p style="margin:8px 0 0;font-size:12.5px;">Bأ،sico: '+byLevel.basico.c+'/'+byLevel.basico.t+' آ· Intermedio: '+byLevel.intermedio.c+'/'+byLevel.intermedio.t+' آ· Avanzado: '+byLevel.avanzado.c+'/'+byLevel.avanzado.t+' آ· Puente: '+byLevel.puente.c+'/'+byLevel.puente.t+'</p></div>';
  }}
];

var state = { current: 0, practiceIndex: 0, practiceAnswers: {}, diffIndex: 0, diffAnswers: {}, quizIndex: 0, quizAnswers: {} };
function renderDots(){ var dots=document.getElementById("dots"); dots.innerHTML=""; CELLS.forEach(function(c,i){ var d=document.createElement("div"); d.className="dot"+(i===state.current?" active":""); dots.appendChild(d); }); }
function renderStage(){
  var stage=document.getElementById("stage");
  stage.innerHTML='<div class="cell active">'+CELLS[state.current].render(state)+'</div>';
  document.getElementById("cellLabel").textContent=CELLS[state.current].label;
  document.getElementById("backBtn").disabled=state.current===0;
  var nextBtn=document.getElementById("nextBtn"); var blocked=false;
  if(state.current===4) blocked=!(state.practiceIndex===PRACTICE_CASES.length-1 && state.practiceAnswers[PRACTICE_CASES.length-1]!==undefined);
  else if(state.current===5) blocked=!(state.diffIndex===DIFFERENTIAL_CASES.length-1 && state.diffAnswers[DIFFERENTIAL_CASES.length-1]!==undefined);
  else if(state.current===6) blocked=state.quizIndex<QUESTIONS.length;
  nextBtn.disabled=blocked;
  nextBtn.textContent = state.current===CELLS.length-1 ? "Reiniciar mأ³dulo" : (blocked?"Completa los casos para continuar":"Siguiente â†’");
  renderDots();
}
function pickPractice(i){ var idx=state.practiceIndex; if(state.practiceAnswers[idx]!==undefined) return; state.practiceAnswers[idx]=i; renderStage(); }
function nextPracticeCase(){ state.practiceIndex++; renderStage(); }
function pickDiff(i){ var idx=state.diffIndex; if(state.diffAnswers[idx]!==undefined) return; state.diffAnswers[idx]=i; renderStage(); }
function nextDiffCase(){ state.diffIndex++; renderStage(); }
function pickQuiz(i){ var idx=state.quizIndex; if(state.quizAnswers[idx]!==undefined) return; state.quizAnswers[idx]=i; renderStage(); }
function nextQuizQuestion(){ state.quizIndex++; renderStage(); }
function restartQuiz(){ state.quizIndex=0; state.quizAnswers={}; renderStage(); }
document.getElementById("backBtn").onclick=function(){ if(state.current>0){ state.current--; renderStage(); } };
document.getElementById("nextBtn").onclick=function(){ if(state.current<CELLS.length-1){ state.current++; renderStage(); } else { state={current:0,practiceIndex:0,practiceAnswers:{},diffIndex:0,diffAnswers:{},quizIndex:0,quizAnswers:{}}; renderStage(); } };
renderStage();
</script>
